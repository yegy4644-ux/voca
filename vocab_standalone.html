r includes a concluding paragraph that encapsulates the main points.", "example_ko": "그 논문은 요점을 요약하는 결론 단락을 포함하고 있다."}], "id": 345, "mnemonic": ""}, {"day": 7, "num": 9, "word": "relatively", "pron": "rélətivli", "stars": 3, "derivatives": ["adj. relative"], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["comparatively", "by comparison"], "meaning": "비교적으로", "example": "Roses have a relatively stronger fragrance than sunflowers.", "example_ko": "장미는 해바라기보다 비교적 더 강한 향기를 가지고 있다."}], "id": 346, "mnemonic": ""}, {"day": 7, "num": 10, "word": "hazard", "pron": "hǽzərd", "stars": 3, "derivatives": ["adj. hazardous"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["risk", "danger", "peril", "jeopardy"], "meaning": "위험", "example": "Reduced regulation created hazards to public health and safety.", "example_ko": "완화된 규제가 공공 보건과 안전에 위험을 초래했다."}], "id": 347, "mnemonic": ""}, {"day": 7, "num": 11, "word": "paramount", "pron": "pǽrəmàunt", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["supreme", "prime", "chief"], "meaning": "최고의 중요한", "example": "The company's paramount concern was its declining sales.", "example_ko": "그 회사의 최고 관심사는 감소하는 매출이었다."}], "id": 348, "mnemonic": ""}, {"day": 7, "num": 12, "word": "unwieldy", "pron": "ʌnwíːldi", "stars": 3, "derivatives": [], "exam_tip": "awkward는 주로 '어색한'이라는 뜻으로 쓰여서 unwieldy의 동의어가 아니라고 생각할 수 있다. 그러나 'the ship's awkward size (다루기 힘든 배의 크기)'에서처럼 awkward가 '다루기 힘든'이라는 뜻으로 사용될 때에는 unwieldy의 동의어가 될 수 있다.", "senses": [{"pos": "adj.", "synonyms": ["difficult to manage", "awkward"], "meaning": "(크기·무게 때문에) 다루기 힘든", "example": "Heavy vehicles such as trucks and tractors can be unwieldy to operate.", "example_ko": "트럭이나 트랙터와 같은 대형 차량들은 운전하기 힘들 수 있다."}], "id": 349, "mnemonic": ""}, {"day": 7, "num": 13, "word": "subsequent", "pron": "sʌ́bsikwənt", "stars": 3, "derivatives": ["adv. subsequently"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["succeeding", "following", "later", "following in time"], "meaning": "그 다음의", "example": "The first earthquake was strong, but luckily the subsequent ones were weak.", "example_ko": "첫 번째 지진은 강했지만, 다행히도 그 다음의 지진들은 약했다."}], "id": 350, "mnemonic": ""}, {"day": 7, "num": 14, "word": "striking", "pron": "stráikiŋ", "stars": 3, "derivatives": ["adv. strikingly"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["noticeable", "remarkable", "attention-getting"], "meaning": "현저한", "example": "There was a striking difference in the building's appearance after the renovation.", "example_ko": "보수 후에 그 건물의 외관에는 현저한 차이가 있었다."}], "id": 351, "mnemonic": ""}, {"day": 7, "num": 15, "word": "extended", "pron": "iksténdid", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["long-lasting", "prolonged"], "meaning": "장기간에 걸친", "example": "Images of Venus indicate that the planet may have had extended periods of geological activity.", "example_ko": "금성의 사진들은 이 행성이 장기간에 걸친 지질학적 활동을 겪었을 수도 있다는 것을 보여준다."}], "id": 352, "mnemonic": ""}, {"day": 7, "num": 16, "word": "ephemeral", "pron": "ifémərəl", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["short-lived", "living for a short time", "temporary"], "meaning": "단명하는, 덧없는", "example": "A mayfly is an ephemeral insect that has a lifespan of less than 48 hours.", "example_ko": "하루살이는 48시간 미만의 수명을 가진 단명하는 곤충이다."}], "id": 353, "mnemonic": ""}, {"day": 7, "num": 17, "word": "rigid", "pron": "rídʒid", "stars": 3, "derivatives": ["adv. rigidly"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["strict", "exact", "severe", "rigorous"], "meaning": "엄격한", "example": "The rules at the military boot camp are so rigid that many drop out on the first day.", "example_ko": "군대 신병 훈련소의 규율은 매우 엄격해서 많은 사람들이 첫째 날에 낙오한다."}, {"pos": "adj.", "synonyms": ["stiff", "hard", "firm"], "meaning": "굳은, 경직된", "example": "When Ted heard the news, his whole body went rigid with shock.", "example_ko": "Ted가 그 소식을 들었을 때, 그의 온몸은 e an important milestone in his or her physical development.", "example_ko": "아이의 서투른 첫 걸음은 신체적 발달에서 중요한 사건이다."}], "id": 378, "mnemonic": ""}, {"day": 7, "num": 42, "word": "constrain", "pron": "kənstréin", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["oblige", "bind", "force", "pressure"], "meaning": "강요하다", "example": "The threat of social exclusion constrains people to behave in culturally acceptable ways.", "example_ko": "사회적으로 배제되는 것의 위협은 사람들이 문화적으로 용인되는 방식으로 행동하도록 강요한다."}, {"pos": "v.", "synonyms": ["inhibit", "restrain", "restrict"], "meaning": "억제하다", "example": "The country's economic growth was constrained by a high level of inflation.", "example_ko": "그 국가의 경제 성장은 높은 수준의 인플레이션으로 인해 억제되었다."}], "id": 379, "mnemonic": ""}, {"day": 7, "num": 43, "word": "turmoil", "pron": "táːrmɔil", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["unrest", "agitation", "stir"], "meaning": "소란, 동요", "example": "When the electricity went out across the city, it created turmoil among the residents.", "example_ko": "온 도시의 전기가 나가자, 주민들 사이에서 소란이 일어났다."}], "id": 380, "mnemonic": ""}, {"day": 7, "num": 44, "word": "property", "pron": "prápərti", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["characteristic", "character", "quality"], "meaning": "특성", "example": "Professor Kim discussed the properties of gas molecules in detail during the lecture.", "example_ko": "Kim 교수는 강의에서 기체 분자들의 특성에 대해 자세히 논했다."}, {"pos": "n.", "synonyms": ["estate", "possession", "havings"], "meaning": "재산", "example": "Albert lost all of his property in the fire.", "example_ko": "Albert는 화재로 그의 전 재산을 잃었다."}], "id": 381, "mnemonic": ""}, {"day": 7, "num": 45, "word": "fuel", "pron": "fjúːəl", "stars": 1, "derivatives": [], "exam_tip": "encourage는 주로 '격려하다'라는 뜻으로 쓰여서 fuel의 동의어가 아니라고 생각할 수 있다. 그러나 'encourage the revolution(혁명을 자극하다)'에서처럼 encourage가 '자극하다'라는 뜻으로 사용될 때에는 fuel의 동의어가 될 수 있다.", "senses": [{"pos": "v.", "synonyms": ["give energy to", "encourage"], "meaning": "연료를 공급하다; 자극하다", "example": "Coal fueled the engines used in the steamships of the 19th century.", "example_ko": "석탄은 19세기의 증기선에 사용된 엔진에 연료를 공급했다."}], "id": 382, "mnemonic": ""}, {"day": 7, "num": 46, "word": "majestic", "pron": "mədʒéstik", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["magnificent", "grand", "august"], "meaning": "위엄 있는, 웅대한", "example": "The bald eagle is so majestic that the US made the animal its national bird.", "example_ko": "흰머리 독수리는 매우 위엄 있어서 미국은 그 동물을 국조로 지정하였다."}], "id": 383, "mnemonic": ""}, {"day": 7, "num": 47, "word": "preeminent", "pron": "priémənənt", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["outstanding", "distinguished", "foremost"], "meaning": "뛰어난", "example": "Marcel Duchamp was one of the preeminent artists of the 20th century.", "example_ko": "마르셀 뒤샹은 20세기의 가장 뛰어난 화가들 중 하나였다."}], "id": 384, "mnemonic": ""}, {"day": 7, "num": 48, "word": "crude", "pron": "kruːd", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["rough", "primitive", "raw", "unrefined"], "meaning": "가공하지 않은", "example": "Dietary experts believe that crude sea salt contains more nutrients than its refined counterparts.", "example_ko": "식이 요법 전문가들은 가공되지 않은 천일염이 정제된 소금보다 더 많은 영양분을 포함하고 있다고 믿는다."}], "id": 385, "mnemonic": ""}, {"day": 7, "num": 49, "word": "variety", "pron": "vəráiəti", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["diversity", "multiplicity"], "meaning": "다양성", "example": "The variety of trees is a result of millions of years of evolution.", "example_ko": "수목의 다양성은 수백만 년에 걸친 진화의 산물이다."}, {"pos": "n.", "synonyms": ["type", "species", "sort", "kind"], "meaning": "종류", "example": "The catfish is a popular variety of freshwater fish.", "example_ko": "메기는 인기 있는 종류의 민물고기이다."}], "id": 386, "mnemonic": ""}, {"day": 7, "num const WORDS = window.WORDS || [];
const LS_PROG = "voca_progress_v2";   // {id:{box,due,seen,ok,no,learned}}
const LS_MNEMO = "voca_mnemo_v2";     // {id:"경선식 연상법"}

/* ---- storage ---- */
const load = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) || def; } catch { return def; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
let prog = load(LS_PROG, {});
let mnemo = load(LS_MNEMO, {});

/* ---- date / SRS ---- */
const todayStr = () => { const d = new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); };
const dayNum = () => Math.floor((Date.now() - new Date().getTimezoneOffset()*60000) / 86400000);
const INTERVALS = [0, 1, 2, 4, 7, 15, 30];

function getP(id){ return prog[id] || {box:0, due:0, seen:0, ok:0, no:0, learned:false}; }
function isDue(id){ const p = prog[id]; return p && p.learned && p.due <= dayNum(); }
function isLearned(id){ const p = prog[id]; return p && p.learned; }
function grade(id, correct){
  const p = getP(id);
  p.seen++;
  if(correct){ p.ok++; p.box = Math.min(p.box+1, INTERVALS.length-1); p.learned = true; }
  else { p.no++; p.box = 0; p.learned = true; }
  p.due = dayNum() + INTERVALS[p.box];
  prog[id] = p; save(LS_PROG, prog);
}

/* ---- word helpers (new schema with senses) ---- */
const DAYS = [...new Set(WORDS.map(w=>w.day))].sort((a,b)=>a-b);
function wMeaning(w){ return w.senses.map(s=>s.meaning).join(" / "); }
function wSyns(w){ const all=[]; w.senses.forEach(s=>s.synonyms.forEach(x=>{ if(!all.includes(x)) all.push(x); })); return all; }
function boldWord(sentence, word){
  // bold the headword (and simple inflections) in example
  const base = word.split(" ")[0].replace(/[^a-zA-Z]/g,"");
  if(!base) return esc(sentence);
  const re = new RegExp("\\b("+base+"[a-z]*)\\b","gi");
  return esc(sentence).replace(re, "<b>$1</b>");
}

/* ---- elements ---- */
const $ = s => document.querySelector(s);
const sections = ["home","study","quiz","done"];
function show(sec){ sections.forEach(s=>$("#"+s).classList.toggle("hidden", s!==sec)); window.scrollTo(0,0); }
function toast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),1600); }
function esc(s){ return (s+"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---- home ---- */
function dueCount(){ return WORDS.filter(w=>isDue(w.id)).length; }
function learnedCount(){ return WORDS.filter(w=>isLearned(w.id)).length; }
function renderHome(){
  const cs = $("#catSel");
  cs.innerHTML = `<option value="__all">전체</option>` + DAYS.map(d=>`<option value="${d}">DAY ${d}</option>`).join("");
  const total = WORDS.length, learned = learnedCount(), due = dueCount();
  $("#homeBar").style.width = (total? (learned/total*100):0) + "%";
  $("#homeProg").textContent = `${learned} / ${total} 외움`;
  $("#homeDue").textContent = `오늘 복습 ${due}개`;
  $("#reviewBadge").textContent = `오늘 ${due}개`;
  $("#hstat").textContent = `${learned}/${total}`;
  $("#totalCount").textContent = total;
}

/* ---- session ---- */
function pool(){
  const day = $("#catSel").value;
  return WORDS.filter(w=> day==="__all" || w.day===parseInt(day,10));
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildSession(mode){
  const count = parseInt($("#countSel").value,10);
  if(mode==="review"){
    let arr = WORDS.filter(w=>isDue(w.id));
    arr.sort((a,b)=>getP(a.id).due - getP(b.id).due);
    return arr;
  }
  let arr = pool();
  if($("#newFirst").checked){
    arr = shuffle(arr.filter(w=>!isLearned(w.id))).concat(shuffle(arr.filter(w=>isLearned(w.id))));
  } else arr = shuffle(arr);
  return arr.slice(0, count);
}

/* ================= STUDY / REVIEW / SYN ================= */
let S = null, timerId = null;
function clearTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }

function startStudy(mode){
  const list = buildSession(mode);
  if(!list.length){ toast(mode==="review"?"오늘 복습할 단어가 없어요 👍":"학습할 단어가 없어요"); return; }
  S = { mode, list, i:0, ok:0, no:0, revealed:false };
  $("#studyTitle").textContent = mode==="review"?"복습":mode==="syn"?"동의어":"외우기";
  show("study"); renderCard();
}

function renderCard(){
  clearTimer(); S.revealed=false;
  const w = S.list[S.i];
  $("#studyIdx").textContent = `${S.i+1} / ${S.list.length}`;
  const qcard = $("#qcard");
  $("#afterArea").innerHTML = "";
  const stars = "★".repeat(w.stars||0);
  if(S.mode==="syn"){
    qcard.innerHTML = `
      <div class="qcat">DAY ${w.day} · 동의어로 단어 맞히기</div>
      <div class="syns" style="justify-content:center;margin-top:14px">
        ${wSyns(w).slice(0,8).map(s=>`<span class="syn">${esc(s)}</span>`).join("")||'<span class="small">동의어 없음</span>'}
      </div>
      <div class="qhint">탭하면 정답 공개</div>`;
  } else {
    qcard.innerHTML = `
      <div class="qcat">DAY ${w.day} <span class="stars">${stars}</span></div>
      <div class="qword">${esc(w.word)}</div>
      ${w.pron?`<div class="pron">[${esc(w.pron)}]</div>`:""}
      <div class="qhint">탭하면 뜻 공개</div>`;
  }
  const limit = parseInt($("#timeSel").value,10);
  const bar = $("#timerBar"), fill = $("#timerFill");
  bar.classList.remove("warn","danger");
  if(limit>0 && S.mode!=="review"){
    bar.style.visibility="visible"; let remain=limit*1000; const total=remain; fill.style.width="100%";
    timerId=setInterval(()=>{
      remain-=100; const pct=Math.max(0,remain/total*100); fill.style.width=pct+"%";
      bar.classList.toggle("warn",pct<50&&pct>=20); bar.classList.toggle("danger",pct<20);
      if(remain<=0){ clearTimer(); reveal(); }
    },100);
  } else bar.style.visibility="hidden";
}

function reveal(){
  if(S.revealed) return;
  S.revealed=true; clearTimer();
  const w = S.list[S.i];
  const stars = "★".repeat(w.stars||0);
  $("#qcard").innerHTML = `
    <div class="qcat">DAY ${w.day} <span class="stars">${stars}</span></div>
    <div class="qword">${esc(w.word)}</div>
    ${w.pron?`<div class="pron">[${esc(w.pron)}]</div>`:""}`;

  const senses = w.senses.map(s=>`
    <div class="sense">
      <div><span class="pos">${esc(s.pos)}</span><span class="mn">${esc(s.meaning)}</span></div>
      <div class="syns" style="margin-top:7px">${s.synonyms.map(x=>`<span class="syn">${esc(x)}</span>`).join("")}</div>
      ${s.example?`<div class="example"><div class="en">${boldWord(s.example,w.word)}</div><div class="ko">${esc(s.example_ko||"")}</div></div>`:""}
    </div>`).join("");

  const deriv = (w.derivatives&&w.derivatives.length)?`<div class="deriv">파생어 ${w.derivatives.map(d=>`<span>${esc(d)}</span>`).join("")}</div>`:"";
  const tip = w.exam_tip?`<button class="tipbtn" id="tipBtn">💡 최신출제포인트 보기</button><div class="tipbox hidden" id="tipBox">${esc(w.exam_tip)}</div>`:"";

  $("#afterArea").innerHTML = `
    <div class="reveal">
      ${senses}
      ${deriv}
      ${tip}
      <div class="sec-title" style="margin-top:14px">경선식 연상법 ✏️</div>
      <div id="mnemoView"></div>
      <div class="grid grade">
        <button class="gbtn no" id="bNo">✕ 몰랐음</button>
        <button class="gbtn ok" id="bOk">○ 알았음</button>
      </div>
    </div>`;
  if(w.exam_tip){ $("#tipBtn").onclick=()=>{ $("#tipBox").classList.toggle("hidden"); }; }
  renderMnemo(w);
  $("#bOk").onclick=()=>answer(true);
  $("#bNo").onclick=()=>answer(false);
}

function renderMnemo(w){
  const box=$("#mnemoView"); const m=mnemo[w.id]||"";
  box.innerHTML = m
    ? `<div class="mnemo" id="mClick">${esc(m)}</div>`
    : `<div class="mnemo empty" id="mClick">+ 경선식 연상법 추가 (사진 보고 입력)</div>`;
  $("#mClick").onclick=()=>editMnemo(w);
}
function editMnemo(w){
  $("#mnemoView").innerHTML = `
    <textarea id="mEdit" placeholder="경선식 연상법 입력...">${esc(mnemo[w.id]||"")}</textarea>
    <div class="row" style="margin-top:8px">
      <button class="ghost" id="mSave" style="background:var(--green);color:#fff">저장</button>
      <button class="ghost" id="mCancel">취소</button>
    </div>`;
  const ta=$("#mEdit"); ta.focus();
  $("#mSave").onclick=()=>{ const v=ta.value.trim(); if(v) mnemo[w.id]=v; else delete mnemo[w.id]; save(LS_MNEMO,mnemo); renderMnemo(w); toast("연상법 저장됨"); };
  $("#mCancel").onclick=()=>renderMnemo(w);
}

function answer(correct){ const w=S.list[S.i]; grade(w.id,correct); if(correct)S.ok++; else S.no++; next(); }
function next(){ S.i++; if(S.i>=S.list.length){ finish(); return; } renderCard(); }

/* ================= QUIZ ================= */
let Q=null;
function startQuiz(){
  const list=buildSession("study");
  if(list.length<4){ toast("퀴즈는 최소 4단어 필요"); return; }
  Q={list,i:0,score:0}; show("quiz"); renderQuiz();
}
function renderQuiz(){
  const w=Q.list[Q.i]; const e2k=Math.random()<0.5;
  $("#quizIdx").textContent=`${Q.i+1} / ${Q.list.length}`;
  $("#quizScore").textContent=`${Q.score}점`;
  const others=shuffle(WORDS.filter(x=>x.id!==w.id)).slice(0,3);
  const opts=shuffle([w,...others]);
  $("#quizQ").innerHTML = e2k
    ? `<div class="qcat">뜻 고르기</div><div class="qword" style="font-size:32px">${esc(w.word)}</div>`
    : `<div class="qcat">단어 고르기</div><div class="meaning" style="margin:6px 0;font-size:20px">${esc(wMeaning(w))}</div>`;
  const box=$("#quizOpts"); box.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button"); b.className="opt";
    b.textContent = e2k ? wMeaning(o) : o.word;
    b.onclick=()=>{
      const right=o.id===w.id;
      [...box.children].forEach(c=>c.disabled=true);
      b.classList.add(right?"correct":"wrong");
      if(!right){ const ans=e2k?wMeaning(w):w.word; [...box.children].forEach(c=>{ if(c.textContent===ans) c.classList.add("correct"); }); }
      grade(w.id,right); if(right)Q.score++;
      setTimeout(()=>{ Q.i++; if(Q.i>=Q.list.length) finishQuiz(); else renderQuiz(); }, right?500:1100);
    };
    box.appendChild(b);
  });
}
function finishQuiz(){
  clearTimer();
  $("#doneEmoji").textContent=Q.score===Q.list.length?"🏆":Q.score>=Q.list.length*0.7?"🎉":"💪";
  $("#doneTitle").textContent=`${Q.score} / ${Q.list.length} 정답`;
  $("#doneSub").textContent="퀴즈 완료";
  $("#dOk").textContent=Q.score; $("#dNo").textContent=Q.list.length-Q.score; $("#dDue").textContent=dueCount();
  $("#againBtn").onclick=()=>startQuiz();
  show("done"); renderHome();
}

/* ================= finish (study) ================= */
function finish(){
  clearTimer();
  $("#doneEmoji").textContent=S.no===0?"🏆":"🎉";
  $("#doneTitle").textContent="완료!";
  $("#doneSub").textContent=S.mode==="review"?"복습 끝":"세션 끝";
  $("#dOk").textContent=S.ok; $("#dNo").textContent=S.no; $("#dDue").textContent=dueCount();
  $("#againBtn").onclick=()=>startStudy(S.mode);
  show("done"); renderHome();
}

/* ================= events ================= */
document.querySelectorAll(".mode-btn").forEach(b=>{
  b.onclick=()=>{ const m=b.dataset.mode; if(m==="quiz") startQuiz(); else startStudy(m); };
});
$("#qcard").addEventListener("click", ()=>{ if(S && !S.revealed) reveal(); });
$("#quitStudy").onclick=()=>{ clearTimer(); show("home"); renderHome(); };
$("#quitQuiz").onclick=()=>{ show("home"); renderHome(); };
$("#homeBtn").onclick=()=>{ show("home"); renderHome(); };

/* ---- backup / restore ---- */
$("#exportBtn").onclick=()=>{
  const data={progress:prog,mnemo:mnemo,exported:todayStr(),v:2};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`hackers-voca-backup-${todayStr()}.json`; a.click();
  toast("백업 파일 저장됨");
};
$("#importBtn").onclick=()=>$("#importFile").click();
$("#importFile").onchange=(e)=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
    if(d.progress){ prog=d.progress; save(LS_PROG,prog); }
    if(d.mnemo){ mnemo=d.mnemo; save(LS_MNEMO,mnemo); }
    renderHome(); toast("가져오기 완료 ✅");
  }catch{ toast("파일을 읽을 수 없어요"); } };
  r.readAsText(f); e.target.value="";
};
$("#resetBtn").onclick=()=>{
  if(confirm("진도(외운 단어/복습 일정)를 모두 초기화할까요?\n경선식 연상법은 유지됩니다.")){
    prog={}; save(LS_PROG,prog); renderHome(); toast("초기화 완료");
  }
};

renderHome();

</script>
</body>
</html>
