<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#16a34a">
<title>초록이 보카</title>
<style>
  :root{
    --green:#16a34a; --green-d:#15803d; --bg:#0f172a; --card:#1e293b;
    --card2:#334155; --text:#e2e8f0; --muted:#94a3b8; --ok:#22c55e; --no:#ef4444;
    --accent:#38bdf8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow-x:hidden}
  .example,.mn,.qword{overflow-wrap:break-word;word-break:break-word}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  header{
    background:var(--green); padding:12px 16px; display:flex; align-items:center;
    justify-content:space-between; box-shadow:0 2px 10px rgba(0,0,0,.3); position:sticky; top:0; z-index:10;
  }
  header h1{font-size:18px; margin:0; font-weight:800; letter-spacing:-.5px}
  header .stat{font-size:12px; opacity:.9}
  main{flex:1; padding:16px; max-width:720px; width:100%; margin:0 auto}
  .hidden{display:none!important}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:14px; font-weight:700}
  .grid{display:grid; gap:12px}

  /* home */
  .progress-bar{height:10px;background:var(--card2);border-radius:99px;overflow:hidden;margin:10px 0 4px}
  .progress-bar > div{height:100%;background:var(--green);transition:width .4s}
  .modes{grid-template-columns:1fr 1fr; margin-top:18px}
  .mode-btn{
    background:var(--card); color:var(--text); padding:20px 14px; text-align:left;
    border:1px solid var(--card2); min-height:104px; display:flex; flex-direction:column; justify-content:space-between;
    transition:transform .1s, border-color .2s;
  }
  .mode-btn:active{transform:scale(.97)}
  .mode-btn .ico{font-size:26px}
  .mode-btn .t{font-size:16px;font-weight:800;margin-top:8px}
  .mode-btn .d{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}
  .mode-btn .badge{font-size:12px;color:var(--accent);font-weight:800}

  .panel{background:var(--card);border:1px solid var(--card2);border-radius:16px;padding:16px;margin-top:14px}
  .panel h3{margin:0 0 10px;font-size:14px;color:var(--muted);font-weight:700}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  label.lab{font-size:13px;color:var(--muted)}
  select,input[type=number]{
    background:var(--card2);color:var(--text);border:none;border-radius:10px;padding:8px 10px;font-size:14px;font-family:inherit
  }
  .ghost{background:var(--card2);color:var(--text);padding:10px 14px;font-size:13px}
  .small{font-size:12px;color:var(--muted)}

  /* study card */
  .card-wrap{display:flex;flex-direction:column;min-height:calc(100vh - 130px)}
  .timer{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .timer > div{height:100%;background:var(--accent);width:100%}
  .timer.warn > div{background:#f59e0b}
  .timer.danger > div{background:var(--no)}
  .qcard{
    flex:1;background:var(--card);border:1px solid var(--card2);border-radius:20px;padding:24px 18px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;cursor:pointer
  }
  .qword{font-size:40px;font-weight:900;letter-spacing:-1px;word-break:break-word}
  .qcat{font-size:12px;color:var(--muted);background:var(--card2);padding:3px 10px;border-radius:99px}
  .qhint{color:var(--muted);font-size:13px;margin-top:10px}
  .reveal{width:100%;margin-top:14px;text-align:left;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .meaning{font-size:24px;font-weight:800;text-align:center;margin:4px 0 14px}
  .pron{color:var(--muted);font-size:15px;margin-top:2px}
  .stars{color:#fbbf24;font-size:13px;letter-spacing:2px}
  .sense{border-left:3px solid var(--card2);padding:2px 0 2px 12px;margin:10px 0}
  .sense .pos{display:inline-block;background:var(--card2);color:var(--accent);font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px;margin-right:6px}
  .sense .mn{font-size:19px;font-weight:800;display:inline}
  .example{background:var(--card2);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:14px;line-height:1.5}
  .example .en{color:var(--text)} .example .ko{color:var(--muted);margin-top:4px}
  .example b{color:var(--accent);font-weight:800}
  .deriv{font-size:12px;color:var(--muted);margin-top:8px}
  .deriv span{background:var(--card2);padding:2px 8px;border-radius:6px;margin-right:5px}
  .tipbtn{background:var(--card2);color:#fbbf24;font-size:13px;padding:8px 12px;border-radius:10px;margin-top:12px;width:100%;text-align:left}
  .tipbox{background:#422006;border:1px solid #a16207;border-radius:10px;padding:11px;margin-top:6px;font-size:13.5px;line-height:1.55;white-space:pre-wrap}
  .sec-title{font-size:12px;color:var(--muted);font-weight:700;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .syns{display:flex;flex-wrap:wrap;gap:7px}
  .syn{background:var(--card2);padding:6px 11px;border-radius:99px;font-size:14px}
  .mnemo{background:#422006;border:1px solid #a16207;border-radius:12px;padding:12px;font-size:15px;line-height:1.5;white-space:pre-wrap}
  .mnemo.empty{background:var(--card2);border-style:dashed;border-color:var(--muted);color:var(--muted);font-size:13px}
  textarea{
    width:100%;background:var(--card2);color:var(--text);border:1px solid var(--card2);border-radius:12px;
    padding:11px;font-size:15px;font-family:inherit;resize:vertical;min-height:72px;line-height:1.5
  }
  .grade{grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .gbtn{padding:18px;font-size:17px;color:#fff}
  .gbtn.no{background:var(--no)} .gbtn.ok{background:var(--ok)}
  .reveal-btn{width:100%;padding:16px;font-size:16px;background:var(--green);color:#fff;margin-top:14px}
  .controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .controls .idx{font-size:13px;color:var(--muted)}
  .controls .x{background:var(--card2);color:var(--text);width:36px;height:36px;border-radius:99px;font-size:16px;padding:0}

  /* quiz options */
  .opts{display:grid;gap:10px;margin-top:18px}
  .opt{background:var(--card);border:1px solid var(--card2);color:var(--text);padding:16px;font-size:16px;text-align:left}
  .opt.correct{background:var(--ok);color:#fff;border-color:var(--ok)}
  .opt.wrong{background:var(--no);color:#fff;border-color:var(--no)}
  .opt:disabled{opacity:1}

  /* done screen */
  .done{text-align:center;padding:40px 16px}
  .done .big{font-size:54px}
  .done h2{margin:10px 0 4px}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--card2);
    color:var(--text);padding:10px 18px;border-radius:99px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:50
  }
  .stat-grid{grid-template-columns:1fr 1fr 1fr;text-align:center}
  .stat-grid .s{background:var(--card2);border-radius:12px;padding:12px 6px}
  .stat-grid .n{font-size:22px;font-weight:900}
  .stat-grid .l{font-size:11px;color:var(--muted)}
  a.link{color:var(--accent);font-size:13px}
  .fullbtn{width:100%;padding:16px;font-size:16px;background:var(--green);color:#fff;margin-top:8px}
</style>
</head>
<body>
<header>
  <h1>🟢 초록이 보카</h1>
  <div class="stat" id="hstat"></div>
</header>
<main>
  <!-- HOME -->
  <section id="home">
    <div class="panel">
      <h3>전체 진도</h3>
      <div class="progress-bar"><div id="homeBar" style="width:0%"></div></div>
      <div class="row" style="justify-content:space-between">
        <span class="small" id="homeProg">0 / 0 외움</span>
        <span class="small" id="homeDue">오늘 복습 0개</span>
      </div>
    </div>

    <div class="panel">
      <h3>학습 범위</h3>
      <div class="row">
        <label class="lab">DAY</label>
        <select id="catSel"></select>
        <label class="lab">단어 수</label>
        <select id="countSel">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="30">30</option>
          <option value="50">50</option>
          <option value="9999">전체</option>
        </select>
      </div>
      <div class="row" style="margin-top:10px">
        <label class="lab">제한시간</label>
        <select id="timeSel">
          <option value="0">없음</option>
          <option value="5">5초</option>
          <option value="7" selected>7초</option>
          <option value="10">10초</option>
          <option value="15">15초</option>
        </select>
        <label class="lab"><input type="checkbox" id="newFirst" checked> 안 외운 것 우선</label>
      </div>
    </div>

    <div class="grid modes">
      <button class="mode-btn" data-mode="study">
        <div class="ico">⏱️</div>
        <div><div class="t">외우기</div><div class="d">제한시간 + 자가체크</div></div>
      </button>
      <button class="mode-btn" data-mode="review">
        <div class="ico">🔁</div>
        <div><div class="t">복습</div><div class="d badge" id="reviewBadge">오늘 0개</div></div>
      </button>
      <button class="mode-btn" data-mode="syn">
        <div class="ico">🔗</div>
        <div><div class="t">동의어</div><div class="d">동의어 떠올리기</div></div>
      </button>
      <button class="mode-btn" data-mode="quiz">
        <div class="ico">✅</div>
        <div><div class="t">퀴즈</div><div class="d">영↔한 4지선다</div></div>
      </button>
    </div>

    <div class="panel">
      <h3>백업 / 복원 (기기 간 이동)</h3>
      <p class="small">진도와 경선식 연상법을 파일로 내보내고, 다른 기기에서 가져오세요.</p>
      <div class="row">
        <button class="ghost" id="exportBtn">📤 내보내기</button>
        <button class="ghost" id="importBtn">📥 가져오기</button>
        <button class="ghost" id="resetBtn">⚠️ 진도 초기화</button>
      </div>
      <input type="file" id="importFile" accept="application/json" class="hidden">
    </div>
    <p class="small" style="text-align:center;margin-top:18px"><span id="totalCount">0</span>단어 (DAY 1~7) · 진도는 이 브라우저에 저장됩니다</p>
  </section>

  <!-- STUDY / REVIEW / SYN -->
  <section id="study" class="hidden">
    <div class="controls">
      <button class="x" id="quitStudy">✕</button>
      <span class="idx" id="studyIdx"></span>
      <span class="idx" id="studyTitle"></span>
    </div>
    <div class="card-wrap">
      <div class="timer" id="timerBar"><div id="timerFill"></div></div>
      <div class="qcard" id="qcard"></div>
      <div id="afterArea"></div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="controls">
      <button class="x" id="quitQuiz">✕</button>
      <span class="idx" id="quizIdx"></span>
      <span class="idx" id="quizScore"></span>
    </div>
    <div class="qcard" style="min-height:120px;cursor:default" id="quizQ"></div>
    <div class="opts" id="quizOpts"></div>
  </section>

  <!-- DONE -->
  <section id="done" class="hidden">
    <div class="done">
      <div class="big" id="doneEmoji">🎉</div>
      <h2 id="doneTitle">완료!</h2>
      <p class="small" id="doneSub"></p>
      <div class="grid stat-grid" style="margin:20px 0">
        <div class="s"><div class="n" id="dOk">0</div><div class="l">알았음</div></div>
        <div class="s"><div class="n" id="dNo">0</div><div class="l">몰랐음</div></div>
        <div class="s"><div class="n" id="dDue">0</div><div class="l">남은 복습</div></div>
      </div>
      <button class="fullbtn" id="againBtn">다시</button>
      <button class="fullbtn ghost" id="homeBtn" style="background:var(--card2)">홈으로</button>
    </div>
  </section>
</main>

 54, "word": "mature", "pron": "mətjúər", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["get older", "grow up", "age"], "meaning": "성숙해지다", "example": "As people mature, their personalities and interests often change.", "example_ko": "사람들은 성숙해지면서 흔히 성격과 관심사가 변한다."}], "id": 53, "mnemonic": ""}, {"day": 1, "num": 55, "word": "pillar", "pron": "pílər", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["column", "post"], "meaning": "기둥", "example": "Classical Roman architecture featured several outdoor pillars surrounding a building.", "example_ko": "고대 로마 건축 양식은 건물을 둘러싸는 여러 개의 야외 기둥들을 특징으로 삼았다."}], "id": 54, "mnemonic": ""}, {"day": 1, "num": 56, "word": "encroachment", "pron": "inkróutʃmənt", "stars": 1, "derivatives": ["v. encroach"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["(gradual) invasion", "intrusion"], "meaning": "잠식, 침입", "example": "The encroachment of genetically modified organisms into the food supply worries many consumers.", "example_ko": "유전자 변형 생물체들이 식량 공급을 잠식하는 것은 많은 소비자들을 걱정하게 한다."}], "id": 55, "mnemonic": ""}, {"day": 1, "num": 57, "word": "no wonder", "pron": "", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "phr.", "synonyms": ["unsurprisingly", "unsurprising"], "meaning": "놀랄 일이 아닌", "example": "Over eight million people live in New York City, so no wonder it is crowded.", "example_ko": "8백만이 넘는 사람들이 뉴욕 시에 살고 있기 때문에, 그것이 붐비는 것은 놀랄 일이 아니다."}], "id": 56, "mnemonic": ""}, {"day": 2, "num": 1, "word": "virtually", "pron": "və́ːrtʃuəli", "stars": 3, "derivatives": ["adj. virtual"], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["in effect", "essentially", "almost", "nearly", "almost totally"], "meaning": "사실상; 거의", "example": "Jane's decision to resign was virtually an admission of guilt.", "example_ko": "사직하기로 한 Jane의 결정은 사실상 자신이 유죄라는 것에 대한 인정이었다."}], "id": 57, "mnemonic": ""}, {"day": 2, "num": 2, "word": "unprecedented", "pron": "ʌnp n", "fall"], "meaning": "줄다, 감소하다", "example": "The singer's popularity has been declining since the scandal.", "example_ko": "그 가수의 인기는 스캔들 이후 줄어들고 있다."}, {"pos": "v.", "synonyms": ["refuse", "reject"], "meaning": "거절하다", "example": "Daniel declined to go to the movie theater with Lisa despite her repeated invitations.", "example_ko": "Daniel은 Lisa의 거듭된 초대에도 불구하고 그녀와 함께 영화관에 가기를 거절했다."}], "id": 62, "mnemonic": ""}, {"day": 2, "num": 7, "word": "contemporary", "pron": "kəntémpərèri", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["modern", "present-day", "current"], "meaning": "현대의", "example": "The Internet is an essential tool for doing business in contemporary society.", "example_ko": "인터넷은 현대 사회에서 사업을 하기에 필수적인 도구이다."}, {"pos": "adj.", "synonyms": ["coexisting", "concurrent"], "meaning": "동시대의", "example": "Van Gogh and Gauguin were contemporary artists and good friends.", "example_ko": "반 고흐와 고갱은 동시대의 화가이자 좋은 친구였다."}], "id": 63, "mnemonic": ""}, {"day": 2, "num": 8, "word": "allocate", "pron": "ǽləkèit", "stars": 3, "derivatives": ["n. allocation"], "exam_tip": "allocate와 함께 다음의 단어들을 구별하여 알아두도록 하자.\n• relocate 이동시키다\n• mislocate 잘못 놓다", "senses": [{"pos": "v.", "synonyms": ["distribute", "allot", "designate", "earmark"], "meaning": "할당하다; 배정하다", "example": "The plan allocates $24 million to City Opera for a new theater downtown.", "example_ko": "그 계획은 시내의 새로운 극장을 위해 시립 오페라단에 2천 4백만 달러를 할당한다."}], "id": 64, "mnemonic": ""}, {"day": 2, "num": 9, "word": "drastically", "pron": "drǽstikəli", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["severely", "strikingly", "extremely"], "meaning": "극심하게", "example": "The National Weather Service issued a warning when the weather changed drastically.", "example_ko": "국립 기상청은 날씨가 극심하게 바뀌자 경보를 발령했다."}], "id": 65, "mnemonic": ""}, {"day": 2, "num": 10, "word": "heterogeneous", "pron": "hètərədʒíːniəs", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["varied", "assorted", "mixed"], "meaning": "잡다한, 혼성의", "example": "English includes words from a heterogeneous collection of other languages.", "example_ko": "영어는 다른 언어들의 잡다한 집합에서 따온 단어들을 포함한다."}], "id": 66, "mnemonic": ""}, {"day": 2, "num": 11, "word": "conspicuous", "pron": "kənspíkjuəs", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["(very) noticeable", "clearly visible", "prominent", "obvious"], "meaning": "뚜렷한", "example": "Sharon's addiction to alcohol became conspicuous as she lost control of her drinking habit.", "example_ko": "Sharon이 자신의 음주 습관에 대한 자제력을 상실하면서 그녀의 알코올 중독이 뚜렷해졌다."}], "id": 67, "mnemonic": ""}, {"day": 2, "num": 12, "word": "prolific", "pron": "prəlífik", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["fertile", "fruitful", "productive", "abundant"], "meaning": "다산의, 풍부한", "example": "Rabbits are prolific breeders, with females able to produce hundreds of babies.", "example_ko": "토끼는 암컷이 수백 마리의 새끼를 출산할 수 있는 다산성의 동물이다."}], "id": 68, "mnemonic": ""}, {"day": 2, "num": 13, "word": "fluctuation", "pron": "flʌ̀ktʃuéiʃən", "stars": 3, "derivatives": ["v. fluctuate"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["change", "variation", "variance"], "meaning": "변동", "example": "Even minor temperature fluctuations can be dangerous to tropical fish.", "example_ko": "열대어에게는 작은 온도 변동조차도 위험할 수 있다."}], "id": 69, "mnemonic": ""}, {"day": 2, "num": 14, "word": "encourage", "pron": "inkə́ːridʒ", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["promote", "prompt", "motivate"], "meaning": "촉진하다", "example": "Many studies show that exercise encourages the growth of new brain cells.", "example_ko": "많은 연구들은 운동이 새로운 뇌세포의 증가를 촉진한다는 것을 증명한다."}, {"pos": "v.", "synonyms": ["cheer up", "hearten"], "meaning": "격려하다", "example": "The patients at the hospital were encouraged by the movie star's visit.", "example_ko": "병원의 환자들은 영화 배우의 방문으로 격려를 받았다."}], "id": 70, "mnemonic": ""}, {"day": 2, "num": 15, "word": "abrupt", "pron": "əbrʌ́pt", "stars": 3, "derivatives": ["adv. abruptly"], "exam_tip": "abrupt는 'an abrupt manner(퉁명스러운 태도)'에서처럼 '퉁명스러운'이라는 뜻으로도 많이 쓰인다. 동의어로는 blunt, curt가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "adj.", "synonyms": ["sudden", "sharp", "unexpected"], "meaning": "갑작스러운", "example": "The airbag was wrongly released when the car made an abrupt stop.", "example_ko": "차가 갑작스러운 정지를 하자 에어백이 잘못 터졌다."}], "id": 71, "mnemonic": ""}, {"day": 2, "num": 16, "word": "evaluate", "pron": "ivǽljuèit", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["judge", "assess", "gauge", "appraise"], "meaning": "평가하다", "example": "Judges use several criteria to evaluate Olympic gymnasts' performances.", "example_ko": "심판들은 올림픽 체조 선수들의 연기를 평가하기 위해 여러 가지 기준들을 사용한다."}], "id": 72, "mnemonic": ""}, {"day": 2, "num": 17, "word": "comprehensive", "pron": "kàmprihénsiv", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["thorough", "complete", "exhaustive"], "meaning": "종합적인", "example": "Before entering a foreign market, firms conduct a comprehensive study of the country.", "example_ko": "해외 시장에 진출하기 전에 회사들은 해당 국가에 대한 종합적인 연구를 한다."}], "id": 73, "mnemonic": ""}, {"day": 2, "num": 18, "word": "engrave", "pron": "ingréiv", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["carve", "incise", "etch"], "meaning": "새기다", "example": "Julie can engrave designs in all kinds of materials, such as wood, leather, and metal.", "example_ko": "Julie는 나무, 가죽, 금속과 같은 모든 종류의 소재에 무늬를 새길 수 있다."}], "id": 74, "mnemonic": ""}, {"day": 2, "num": 19, "word": "slight", "pron": "slait", "stars": 2, "derivatives": ["adv. slightly"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["minor", "small", "trivial", "mild"], "meaning": "하찮은; 경미한", "example": "A proofreader will often make slight changes to the final draft of a novel.", "example_ko": "교정자는 종종 소설의 최종 원고에 경미한 변경을 가한다."}], "id": 75, "mnemonic": ""}, {"day": 2, "num": 20, "word": "monotonous", "pron": "mənátənəs", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["unvaried", "boring", "tedious", "dull"], "meaning": "단조로운, 지루한", "example": "Eric quit his job on the assembly line because his tasks were so monotonous.", "example_ko": "Eric은 자신의 직무가 너무 단조로워서 조립 라인에서 하던 일을 그만두었다."}], "id": 76, "mnemonic": ""}, {"day": 2, "num": 21, "word": "regard", "pron": "rigáːrd", "stars": 2, "derivatives": [], "exam_tip": "regarding은 '~에 관하여'라는 뜻의 전치사로 쓰이며, 동의어로는 concerning, with respect to가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "v.", "synonyms": ["consider", "think of", "see"], "meaning": "생각하다, 간주하다", "example": "Despite the depth and complexity of comic books, some people regard them as childish.", "example_ko": "만화책의 깊이와 복잡성에도 불구하고, 어떤 사람들은 그것이 유치하다고 생각한다."}, {"pos": "n.", "synonyms": ["attention", "notice"], "meaning": "관심", "example": "The professor gave little regard to student concerns about the exam's being too difficult.", "example_ko": "교수는 시험이 너무 어렵다는 학생들의 걱정에 관심을 거의 주지 않았다."}], "id": 77, "mnemonic": ""}, {"day": 2, "num": 22, "word": "obsession with", "pron": "", "stars": 2, "derivatives": [], "exam_tip": "obsess는 '(망상 등이) 사로잡다'라는 뜻의 동사로 쓰이며, 동의어로는 preoccupy, possess가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "phr.", "synonyms": ["fixation on", "preoccupation with"], "meaning": "~에 대한 집착", "example": "Some teenagers have an obsession with the Internet and social media.", "example_ko": "몇몇 십 대들은 인터넷과 소셜 미디어에 대한 집착이 있다."}], "id": 78, "mnemonic": ""}, {"day": 2, "num": 23, "word": "optimize", "pron": "áptəmàiz", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["make the best use of"], "meaning": "최대한 잘 활용하다", "example": "The international community should optimize the use of non-renewable fossil fuel resources.", "example_ko": "국제 사회는 , {"day": 2, "num": 48, "word": "elaborately", "pron": "ilǽbərətli", "stars": 1, "derivatives": ["n. elaboration"], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["with great detail"], "meaning": "정교하게", "example": "Because the new law is very complicated, the senator explained it elaborately.", "example_ko": "새 법률은 매우 복잡하기 때문에 상원 의원은 그것을 정교하게 설명했다."}], "id": 104, "mnemonic": ""}, {"day": 2, "num": 49, "word": "autonomous", "pron": "ɔːtάnəməs", "stars": 1, "derivatives": ["n. autonomy"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["independent", "self-determining"], "meaning": "자율적인", "example": "Many college students become autonomous for the first time in their lives.", "example_ko": "많은 대학생들은 인생에서 처음으로 자율적이게 된다."}], "id": 105, "mnemonic": ""}, {"day": 2, "num": 50, "word": "boom", "pron": "buːm", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["flourish", "thrive", "prosper", "rapidly expand"], "meaning": "갑자기 번창하다", "example": "During the Civil War, the American economy boomed.", "example_ko": "남북 전쟁 동안 미국 경제는 갑자기 번창했다."}], "id": 106, "mnemonic": ""}, {"day": 2, "num": 51, "word": "supremacy", "pron": "səpréməsi", "stars": 1, "derivatives": [], "exam_tip": "supremacy의 형용사형인 supreme은 '최고의, 최상의'라는 뜻이며, 동의어로는 paramount, superlative가 출제될 수 있으니 알아두도록 하자.", "senses": [{"pos": "n.", "synonyms": ["dominance", "predominance", "ascendancy"], "meaning": "우위", "example": "In the 1920s, Henry Ford lost the battle for supremacy in the automobile industry to General Motors.", "example_ko": "1920년대에 헨리 포드는 자동차 산업에서 우위를 점하기 위한 경쟁에서 제너럴 모터스에 졌다."}], "id": 107, "mnemonic": ""}, {"day": 2, "num": 52, "word": "ravage", "pron": "rǽvidʒ", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["destroy", "demolish", "devastate", "ruin"], "meaning": "파괴하다", "example": "The large hurricane that ravaged the city of New Orleans caused extensive flooding.", "example_ko": "뉴올리언스 시를 파괴한 거대한 허리케인은 대규모 홍수를 야 ": "강조하다", "example": "The president emphasized the need for the entire country to be on high alert against terrorism.", "example_ko": "대통령은 나라 전체가 테러에 대해 매우 경계하고 있어야 할 필요성을 강조했다."}], "id": 140, "mnemonic": ""}, {"day": 3, "num": 29, "word": "largely", "pron": "lɑ́ːrdʒli", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["generally", "mostly", "mainly"], "meaning": "대부분", "example": "Korea's citizens are largely of Korean descent, although there is a sizeable foreign population as well.", "example_ko": "상당수의 외국인들도 있긴 하지만, 한국에 사는 사람들은 대부분 한국계이다."}], "id": 141, "mnemonic": ""}, {"day": 3, "num": 30, "word": "experimental", "pron": "ikspèrəméntl", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["trial", "tentative"], "meaning": "시험적인", "example": "Vaccines go through an experimental phase to make sure that they are safe before being released.", "example_ko": "백신은 그것이 안전하다는 것을 보장하기 위해 출시되기 전에 시험적 단계를 거친다."}], "id": 142, "mnemonic": ""}, {"day": 3, "num": 31, "word": "drain", "pron": "drein", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["withdraw liquid gradually", "remove water"], "meaning": "물을 빼내다", "example": "The sink should be drained after each use.", "example_ko": "싱크대는 매번 사용한 후에 물을 빼내야 한다."}], "id": 143, "mnemonic": ""}, {"day": 3, "num": 32, "word": "denote", "pron": "dinóut", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["indicate", "signify", "represent"], "meaning": "나타내다, 표시하다", "example": "A raised head and flattened neck denote that a cobra is about to strike.", "example_ko": "높이 든 머리와 납작해진 목은 코브라가 곧 공격할 것이라는 것을 나타낸다."}], "id": 144, "mnemonic": ""}, {"day": 3, "num": 33, "word": "repudiate", "pron": "ripjú:dièit", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["reject", "disclaim"], "meaning": "거부하다", "example": "Martin Luther King Jr. repudiated violence as a mean ", "example": "Software companies use feedback from customers to fine-tune programs for better performance.", "example_ko": "소프트웨어 회사들은 더 나은 성능을 위해 프로그램을 미세하게 조정하려고 고객들로부터 받은 의견을 이용한다."}], "id": 164, "mnemonic": ""}, {"day": 3, "num": 53, "word": "enthusiastic", "pron": "inθùːziǽstik", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["eager", "ardent", "zealous"], "meaning": "열광적인", "example": "The citizenry was enthusiastic about the decision to cut taxes by 10 percent.", "example_ko": "시민들은 세금을 10% 삭감한다는 결정에 열광적이다."}], "id": 165, "mnemonic": ""}, {"day": 3, "num": 54, "word": "loose", "pron": "luːs", "stars": 1, "derivatives": [], "exam_tip": "loose는 형용사가 아닌 동사로도 많이 쓰인다. 동사로는 'loose a knot(매듭을 풀다)'에서처럼 '매듭 등을) 풀다'라는 뜻으로 주로 쓰이며, 동의어로는 disentangle이 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "adj.", "synonyms": ["not strict", "relaxed", "slack"], "meaning": "느슨한", "example": "The office dress code was loose and allowed employees to wear jeans and T-shirts.", "example_ko": "그 사무실의 복장 규정은 느슨했고 직원들이 청바지와 티셔츠를 입는 것을 허용했다."}], "id": 166, "mnemonic": ""}, {"day": 3, "num": 55, "word": "portrait", "pron": "pɔ́rtrit", "stars": 1, "derivatives": ["v. portray"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["picture"], "meaning": "초상화", "example": "Art students study how to draw portraits that capture the subject's personality.", "example_ko": "미술학도들은 대상의 개성을 담아내는 초상화를 어떻게 그리는지 배운다."}], "id": 167, "mnemonic": ""}, {"day": 3, "num": 56, "word": "terminology", "pron": "tə̀ːrmənálədʒi", "stars": 1, "derivatives": ["v. term"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["vocabulary", "jargon", "language"], "meaning": "전문 용어", "example": "Science articles that are meant for a general audience should avoid complex terminology.", "example_ko": "일반 독자를 위한 과학 기사는 복잡한 전문 용어를 피해야 한다."}], "id": 168, "mnemonic": ""}, {"day": 4, "num": 1, "word": "readily", "pron": "rédəli", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["easily", "effortlessly", "quickly"], "meaning": "손쉽게; 즉시", "example": "In the experiment, rats readily learned to associate certain behaviors with rewards.", "example_ko": "실험에서 쥐는 특정 행동을 보상과 관련지어 생각하는 것을 손쉽게 배웠다."}, {"pos": "adv.", "synonyms": ["willingly", "without reluctance"], "meaning": "기꺼이", "example": "When Nathan was offered a larger office, he readily accepted it.", "example_ko": "Nathan은 더 넓은 사무실을 제안받았을 때, 그것을 기꺼이 받아들였다."}], "id": 169, "mnemonic": ""}, {"day": 4, "num": 2, "word": "advocate", "pron": "ǽdvəkèit", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["promote", "speak in favor of", "argue in support of"], "meaning": "지지하다", "example": "The lobbyist is advocating the new bill in his letter to the senator.", "example_ko": "그 로비스트는 상원 의원에게 보내는 편지에서 새 법안을 지지하고 있다."}, {"pos": "n.", "synonyms": ["proponent", "supporter", "upholder"], "meaning": "지지자", "example": "Norman Sisisky was a strong advocate for defense spending during nine terms in Congress.", "example_ko": "노먼 시시스키는 아홉 번의 국회 임기 동안 국방비 지출의 열렬한 지지자였다."}], "id": 170, "mnemonic": ""}, {"day": 4, "num": 3, "word": "utterly", "pron": "ʌ́tərli", "stars": 3, "derivatives": [], "exam_tip": "utterly의 형용사인 utter는 '소리를 내다, 말하다'라는 뜻의 동사로도 쓰이며, 동의어로는 speak, voice가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "adv.", "synonyms": ["completely", "totally"], "meaning": "완전히", "example": "John enjoyed the movie, but he was utterly surprised by the movie's ending.", "example_ko": "John은 그 영화를 즐겁게 보았지만 영화의 결말에 대해서는 완전히 놀랐다."}], "id": 171, "mnemonic": ""}, {"day": 4, "num": 4, "word": "abound", "pron": "əbáund", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["overflow", "teem", "be plentiful", "be numerous"], "meaning": "아주 많다, 풍부하다", "example": "Wild dolphins abound in Canada's Bay of Fundy.", "example_ko": "야생 돌고래들은 캐나다의 펀디 만에 아주 많다."}], "id": 172, "mnemonic": ""}, {"day": 4, "num": 5, "word": "formidable", "pron": "fɔ́ːrmidəbl", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["impressive"], "meaning": "어마어마한, 경외감을 일으키는", "example": "The creation of the United Nations was a formidable achievement in international cooperation.", "example_ko": "유엔의 창설은 국제 협력에 있어서 어마어마한 업적이었다."}, {"pos": "adj.", "synonyms": ["difficult to handle"], "meaning": "만만치 않은, 감당하기 어려운", "example": "For working parents, raising children is formidable.", "example_ko": "일하는 부모들에게 아이들을 기르는 것은 만만치 않다."}], "id": 173, "mnemonic": ""}, {"day": 4, "num": 6, "word": "enormous", "pron": "inɔ́ːrməs", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["huge", "very large", "great", "immense", "vast", "tremendous"], "meaning": "거대한", "example": "China's enormous population poses a major challenge for the country's food production system.", "example_ko": "중국의 거대한 인구는 국가의 식량 생산 체계에 큰 도전을 제기한다."}], "id": 174, "mnemonic": ""}, {"day": 4, "num": 7, "word": "disband", "pron": "disbǽnd", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["dismiss", "disperse", "break up"], "meaning": "해산시키다", "example": "The government has promised to disband the rebel group before the end of the year.", "example_ko": "정부는 올 연말 전에 그 저항 단체를 해산시킬 것을 약속했다."}], "id": 175, "mnemonic": ""}, {"day": 4, "num": 8, "word": "alleged", "pron": "əléd3d", "stars": 3, "derivatives": ["adv. allegedly"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["supposed", "assumed"], "meaning": "추정의", "example": "Investigators interviewed the alleged victim of the crime several times.", "example_ko": "수사관들은 그 범죄의 피해자로 추정되는 사람을 여러 번 면담했다."}], "id": 176, "mnemonic": ""}, {"day": 4, "num": 9, "word": "renowned", "pron": "rináund", "stars": 3, "derivatives": [], "exam_tip": "renown은 '명성'이라는 뜻의 명사로 쓰이며, 동의어로는 fame, reputation이 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "adj.", "synonyms": ["famous", "celebrated", "prominent", "eminent"], "meaning": "유명한", "example": "The renowned scientist was disgraced when it was discovered that he had lied about his work.", "example_ko": "그 유명한 과학자는 자신의 연구에 대해서 거짓말을 했던 것이 드러나서 망신을 당했다."}], "id": 177, "mnemonic": ""}, {"day": 4, "num": 10, "word": "versatile", "pron": "vɔ́ːrsətil", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["adaptable", "flexible"], "meaning": "융통성 있는, 다방면의", "example": "Because of the ever-changing economy, the need for versatile workers is greater than ever before.", "example_ko": "변화무쌍한 경제 때문에 융통성 있는 직원의 필요성이 그 어느 때보다 높다."}], "id": 178, "mnemonic": ""}, {"day": 4, "num": 11, "word": "prohibitive", "pron": "prouhíbitiv", "stars": 3, "derivatives": [], "exam_tip": "prohibitive는 'prohibitive local regulations(현지의 금지 규정들)'에서처럼 '금지의'라는 뜻으로도 많이 쓰인다. 동의어로는 proscriptive가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "adj.", "synonyms": ["unaffordable", "extreme", "exorbitant"], "meaning": "값이 엄청나게 비싼", "example": "For most New Yorkers, the cost of an apartment in Manhattan is prohibitive.", "example_ko": "대부분의 뉴욕 시민들에게 맨해튼의 아파트 값은 엄청나게 비싸다."}], "id": 179, "mnemonic": ""}, {"day": 4, "num": 12, "word": "option", "pron": "ápʃən", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["choice", "selection"], "meaning": "선택(권)", "example": "John had the option of learning German or French.", "example_ko": "John은 독일어나 프랑스어를 배울 수 있는 선택권이 있었다."}], "id": 180, "mnemonic": ""}, {"day": 4, "num": 13, "word": "inherent", "pron": "inhérənt", "stars": 3, "derivatives": ["adv. inherently"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["innate", "built-in", "essential", "congenital"], "meaning": "타고난, 본래의", "example": "The need to be loved and recognized is an inherent part of human beings.", "example_ko": "사랑받고 인정받고 싶어하는 욕구는 인간의 타고난 부분이다."}], "id": 181, "mnemonic": ""}, {"day": 4, "num": 14, "word": "justly", "pron": "d3ʌ́stli", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["rightfully", "justifiably", "lawfully"], "meaning": "공정하게, 정당하게", "example": "The judge justly sentenced the criminal to life in prison.", "example_ko": "판사는 공정하게 그 범죄자에게 종신형을 선고했다."}], "id": 182, "mnemonic": ""}, {"day": 4, "num": 15, "word": "provoke", "pron": "prəvóuk", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["incite", "bring about", "give rise to"], "meaning": "불러일으키다", "example": "At some point during their argument, Betty's rude attitude provoked Sam's anger.", "example_ko": "논쟁 중의 어느 시점에서 Betty의 무례한 태도가 Sam의 화를 불러일으켰다."}], "id": 183, "mnemonic": ""}, {"day": 4, "num": 16, "word": "impermeable", "pron": "impə́ːrmiəbl", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["impenetrable", "impervious"], "meaning": "침투되지 않는, 통과시키지 않는", "example": "Shale is a compacted sedimentary rock that is more impermeable to water than sandstone.", "example_ko": "셰일은 사암보다 더 물이 침투되지 않는 탄탄한 퇴적암이다."}], "id": 184, "mnemonic": ""}, {"day": 4, "num": 17, "word": "momentous", "pron": "mouméntəs", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["significant", "major", "meaningful", "substantial"], "meaning": "중대한", "example": "The signing of the Declaration of Independence was a momentous occasion in American history.", "example_ko": "독립 선언문 서명은 미국 역사에서 중대한 사건이었다."}], "id": 185, "mnemonic": ""}, {"day": 4, "num": 18, "word": "forestall", "pron": "fɔːrstɔ́ːl", "stars": 2, "derivatives": [], "exam_tip": "forestall과 함께 다음의 단어들을 구별하여 알아두도록 하자. · foresee 예견하다 · forego 앞서다", "senses": [{"pos": "v.", "synonyms": ["prevent", "hinder", "avert"], "meaning": "미연에 방지하다", "example": "The union leader forestalled a riot by telling the strikers to disperse.", "example_ko": "노조 대표는 파업자들에게 해산하라고 말함으로써 폭동을 미연에 방지했다."}], "id": 186, "mnemonic": ""}, {"day": 4, "num": 19, "word": "therefore", "pron": "ðɛ́ərfɔ̀ːr", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["consequently", "as a result", "thus", "hence"], "meaning": "그 결과", "example": "Giles was constantly falling asleep in history class and therefore scored very poorly on the final exam.", "example_ko": "Giles는 역사 수업 중에 계속해서 잠들었고, 그 결과 기말고사에서 매우 낮은 점수를 받았다."}], "id": 187, "mnemonic": ""}, {"day": 4, "num": 20, "word": "persuade", "pron": "pərswéid", "stars": 2, "derivatives": ["adv. persuasively"], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["convince", "induce"], "meaning": "설득하다", "example": "Dan persuaded Nancy to go to Italy with him for vacation.", "example_ko": "Dan은 Nancy에게 휴가 때 자신과 함께 이탈리아에 갈 것을 설득했다."}], "id": 188, "mnemonic": ""}, {"day": 4, "num": 21, "word": "proximity", "pron": "prɑksíməti", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["closeness", "nearness"], "meaning": "가까움", "example": "Proximity to a good school is a vital consideration for parents that plan on relocating to a new city.", "example_ko": "새로운 도시로 이사하는 것을 계획 중인 학부모들에게 좋은 학교와 가까운 것은 필수적인 고려 사항이다."}], "id": 189, "mnemonic": ""}, {"day": 4, "num": 22, "word": "dependable", "pron": "dipéndəbl", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["reliable", "trustworthy"], "meaning": "신뢰할 수 있는", "example": "A successful president typically has a dependable staff that offers advice and guidance.", "example_ko": "성공한 대통령에게는 보통 조언과 지도를 해주는 신뢰할 수 있는 보좌진이 있다."}], "id": 190, "mnemonic": ""}, {"day": 4, "num": 23, "word": "ensuing", "pron": "insúːiŋ", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["subsequent", "following", "succeeding"], "meaning": "뒤이은, 다음의", "example": "The earthquake and the ensuing aftershocks destroyed much of San Francisco in 1906.", "example_ko": "지진과 뒤이은 여진이 1906년에 샌프란시스코의 많은 곳을 파괴했다."}], "id": 191, "mnemonic": ""}, {"day": 4, "num": 24, "word": "appreciably", "pron": "əpríːʃiəbli", "stars": 2, "derivatives": ["adj. appreciable"], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["noticeably", "significantly", "considerably"], "meaning": "상당히", "example": "The temperature dropped appreciably this morning.", "example_ko": "오늘 아침에 기온이 상당히 떨어졌다."}], "id": 192, "mnemonic": ""}, {"day": 4, "num": 25, "word": "obligate", "pron": "ábləgèit", "stars": 2, "derivatives": ["n. obligation"], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["force", "coerce", "compel", "constrain"], "meaning": "의무를 지우다, 강요하다", "example": "Most states obligate companies and other organizations to apply the minimum wage law.", "example_ko": "대부분의 주에서는 기업체나 다른 단체들에게 최저임금법을 적용할 것을 강요한다."}], "id": 193, "mnemonic": ""}, {"day": 4, "num": 26, "word": "wholesale", "pron": "hóulsèil", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["extensive", "mass"], "meaning": "대규모의", "example": "The oil spill in the Gulf of Mexico caused the wholesale destruction of the marine ecosystem.", "example_ko": "멕시코 만의 기름 유출은 해양 생태계의 대규모 파괴를 야기했다."}, {"pos": "adv.", "synonyms": ["completely"], "meaning": "모조리, 통틀어서", "example": "The editor's suggestions regarding the document were accepted wholesale.", "example_ko": "그 문서에 대한 편집의의 제안은 모조리 받아들여졌다."}], "id": 194, "mnemonic": ""}, {"day": 4, "num": 27, "word": "dweller", "pron": "dwélər", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["inhabitant", "resident", "occupant"], "meaning": "거주자", "example": "City dwellers tend to have a higher cost of living than those residing in the country.", "example_ko": "도시 거주자들은 교외에 사는 사람들보다 생활비가 더 많이 드는 경향이 있다."}], "id": 195, "mnemonic": ""}, {"day": 4, "num": 28, "word": "tacit", "pron": "tǽsit", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["implicit", "implied", "unspoken"], "meaning": "무언의, 암묵적인", "example": "The two countries made a tacit agreement to end the war, but they did not actually sign a peace treaty.", "example_ko": "두 나라는 전쟁을 끝내기로 무언의 합의를 했지만, 실제로 평화 조약에 서명을 하지는 않았다."}], "id": 196, "mnemonic": ""}, {"day": 4, "num": 29, "word": "resolve", "pron": "rizálv", "stars": 2, "derivatives": [], "exam_tip": "resolve는 'resolve not to see him(그를 만나지 않기로 결심하다)'에서처럼 '결심하다'라는 뜻으로도 많이 쓰인다. 동의어로는 decide, determine이 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "v.", "synonyms": ["settle", "find a solution for", "solve"], "meaning": "해결하다", "example": "In some cases, mediators can help parties resolve legal disputes without going to court.", "example_ko": "어떤 경우에는, 소송 당사자들이 법원에 가지 않고 법적 분쟁을 해결하도록 중재인이 도와줄 수 있다."}], "id": 197, "mnemonic": ""}, {"day": 4, "num": 30, "word": "merit", "pron": "mérit", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["value", "worth", "virtue"], "meaning": "(칭찬할 만한) 가치", "example": "The great merit of the poems is that they make us aware of previously unperceived possibilities.", "example_ko": "시의 위대한 가치는 우리로 하여금 이전에는 눈에 띄지 않았던 가능성을 깨닫게 한다는 것이다."}], "id": 198, "mnemonic": ""}, {"day": 4, "num": 31, "word": "notion", "pron": "nóuʃən", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["concept", "general idea", "opinion", "view"], "meaning": "개념; 견해", "example": "The notion that one is born as a blank slate has long been abandoned by most psychologists.", "example_ko": "인간이 백지 상태로 태어난다는 개념은 대부분의 심리학자들로부터 오랫동안 버림받아 왔다."}], "id": 199, "mnemonic": ""}, {"day": 4, "num": 32, "word": "synthesize", "pron": "sínθəsàiz", "stars": 2, "derivatives": ["n. synthesis"], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["integrate", "combine", "coalesce"], "meaning": "통합하다", "example": "A financial analyst must be able to synthesize data from a variety of sources.", "example_ko": "재무 분석가는 다양한 출처의 자료들을 통합할 수 있어야 한다."}], "id": 200, "mnemonic": ""}, {"day": 4, "num": 33, "word": "spectrum", "pron": "spéktrəm", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["range", "scope", "extent"], "meaning": "범위", "example": "A Renaissance man possesses a broad spectrum of interests that includes the academic and the artistic.", "example_ko": "르네상스적 교양인은 학문적인 것과 예술적인 것을 포함하는 넓은 범위의 관심사를 가지고 있다."}], "id": 201, "mnemonic": ""}, {"day": 4, "num": 34, "word": "stream", "pron": "striːm", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["flow", "current"], "meaning": "흐름", "example": "It was difficult for the plumber to tell where the stream of liquid was coming from.", "example_ko": "배관공은 어디서부터 액체의 흐름이 시작되고 있는지 알기 힘들었다."}], "id": 202, "mnemonic": ""}, {"day": 4, "num": 35, "word": "rupture", "pron": "rʌptʃər", "stars": 2, "derivatives": [], "exam_tip": "breach는 주로 '위반'이라는 뜻으로 쓰여서 rupture의 동의어가 아니라고 생각할 수 있다. 하지만 'a breach between family members(가족 구성원들 사이의 불화)'에서처럼 breach가 '불화'라는 뜻으로 사용될 때에는 rupture의 동의어가 될 수 있다.", "senses": [{"pos": "v.", "synonyms": ["burst", "break apart", "split", "tear"], "meaning": "파열되다, 찢어지다", "example": "Patty's eardrum ruptured due to the sound of the explosion.", "example_ko": "Patty의 고막은 폭발 소리 때문에 파열되었다."}, {"pos": "n.", "synonyms": ["breach", "discord"], "meaning": "불화", "example": "The rupture in Amy and Diana's friendship was resolved after Amy apologized.", "example_ko": "Amy와 Diana의 우정에 생긴 불화는 Amy가 사과한 후 해결되었다."}], "id": 203, "mnemonic": ""}, {"day": 4, "num": 36, "word": "presuppose", "pron": "prìːsəpóuz", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["assume", "suppose", "presume"], "meaning": "(미리) 가정하다", "example": "High-level chemistry courses presuppose that students have a basic knowledge of chemical structures.", "example_ko": "고급 화학 강좌는 학생들이 화학 구조에 관한 기본적인 지식을 가지고 있다고 가정한다."}], "id": 204, "mnemonic": ""}, {"day": 4, "num": 37, "word": "well-to-do", "pron": "wéltədúː", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["wealthy", "affluent", "rich"], "meaning": "부유한", "example": "In the early days of air travel, flight tickets were so expensive that only well-to-do people could afford them.", "example_ko": "비행기 여행의 초창기에는 항공권이 매우 비싸서 부유한 사람들만이 그것을 살 수 있었다."}], "id": 205, "mnemonic": ""}, {"day": 4, "num": 38, "word": "appeal", "pron": "əpíːl", "stars": 2, "derivatives": [], "exam_tip": "appeal은 'his pictures appeal to me(그의 그림들이 내 흥미를 끈다)'에서처럼 '흥미를 끌다'라는 뜻으로도 많이 쓰인다. 동의어로는 interest, attract가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "v.", "synonyms": ["plead", "request", "ask", "beg"], "meaning": "간청하다", "example": "The students appealed to the professor for more time to study for the exam.", "example_ko": "학생들은 교수에게 시험을 위해 공부할 시간을 더 달라고 간청했다."}], "id": 206, "mnemonic": ""}, {"day": 4, "num": 39, "word": "accurately", "pron": "ǽkjurətli", "stars": 2, "derivatives": ["adj. accurate"], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["correctly", "precisely", "exactly"], "meaning": "정확하게", "example": "Many doctors use electronic thermometers to accurately determine their patients' temperatures.", "example_ko": "많은 의사들이 환자의 체온을 정확하게 측정하기 위해 전자 체온계를 사용한다."}], "id": 207, "mnemonic": ""}, {"day": 4, "num": 40, "word": "fastidious", "pron": "fæstídiəs", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["demanding", "choosy"], "meaning": "까다로운", "example": "The director would film the same scene hundreds of times because he was so fastidious.", "example_ko": "그 감독은 매우 까다로워서 같은 장면을 수백 번씩 찍곤 했다."}], "id": 208, "mnemonic": ""}, {"day": 4, "num": 41, "word": "contraction", "pron": "kəntrǽkʃən", "stars": 2, "derivatives": ["v. contract"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["reduction", "diminution"], "meaning": "감소, 축소", "example": "For most companies, a contraction in sales can mean a huge loss in revenues.", "example_ko": "대부분의 회사에서는 매출의 감소는 수익의 큰 손실을 의미할 수 있다."}], "id": 209, "mnemonic": ""}, {"day": 4, "num": 42, "word": "stimulus", "pron": "stímjuləs", "stars": 2, "derivatives": ["v. stimulate"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["impetus", "motivation", "incentive", "incitement"], "meaning": "자극(제)", "example": "Jack's dream of owning a house is a stimulus for him to work hard.", "example_ko": "집을 갖고 싶다는 Jack의 꿈은 그가 열심히 일하도록 하는 자극제이다."}], "id": 210, "mnemonic": ""}, {"day": 4, "num": 43, "word": "track", "pron": "træk", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["follow", "chase", "monitor"], "meaning": "뒤쫓다; (진행 과정 등을) 추적하다", "example": "Investigators tracked the criminal to his hideout.", "example_ko": "수사관들은 범인을 그의 은신처까지 뒤쫓았다."}], "id": 211, "mnemonic": ""}, {"day": 4, "num": 44, "word": "tame", "pron": "teim", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["domesticate", "train"], "meaning": "길들이다", "example": "According to a recent study, dogs were first tamed in prehistoric Europe.", "example_ko": "최근 연구에 따르면, 개는 선사 시대 유럽에서 처음으로 길들여졌다."}], "id": 212, "mnemonic": ""}, {"day": 4, "num": 45, "word": "install", "pron": "instɔ́ːl", "stars": 1, "derivatives": [], "exam_tip": "install은 'install as club president(클럽 회장으로 임명하다)'에서처럼 '임명하다'라는 뜻으로도 많이 쓰인다. 동의어로는 induct, inaugurate가 출제될 수 있으니 알아두도록 하자.", "senses": [{"pos": "v.", "synonyms": ["put in place", "set up", "position"], "meaning": "설치하다", "example": "Many cities have installed radar systems at intersections to discourage reckless driving.", "example_ko": "많은 도시들이 난폭 운전을 막기 위해 교차로에 레이더 장치를 설치했다."}], "id": 213, "mnemonic": ""}, {"day": 4, "num": 46, "word": "chronicle", "pron": "kránikl", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["record", "history"], "meaning": "기록, 연대기", "example": "Anne Frank's diary was a chronicle of her life during the Holocaust.", "example_ko": "안네 프랑크의 일기는 유대인 대학살 동안의 자신의 삶의 기록이었다."}], "id": 214, "mnemonic": ""}, {"day": 4, "num": 47, "word": "novel", "pron": "nável", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["new", "innovative", "unusual"], "meaning": "새로운, 신기한", "example": "Graphic calculators were highly novel in the 1960s.", "example_ko": "그래픽 계산기는 1960년대에 굉장히 새로운 것이었다."}], "id": 215, "mnemonic": ""}, {"day": 4, "num": 48, "word": "isolated", "pron": "áisəlèitid", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["remote", "solitary", "secluded"], "meaning": "외딴", "example": "Henry David Thoreau spent years living in an isolated cabin.", "example_ko": "헨리 데이비드 소로는 외딴 오두막집에서 몇 년을 살았다."}], "id": 216, "mnemonic": ""}, {"day": 4, "num": 49, "word": "exposed", "pron": "ikspóuzd", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["visible", "revealed", "uncovered"], "meaning": "드러난, 노출된", "example": "In the 19th century, it was considered shocking to see a woman with exposed ankles in public.", "example_ko": "19세기에는 공공 장소에서 발목이 드러난 여성을 보는 것은 충격적인 것으로 여겨졌다."}], "id": 217, "mnemonic": ""}, {"day": 4, "num": 50, "word": "intermingled", "pron": "ìntərmíŋgld", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["mixed", "combined", "blended"], "meaning": "섞인", "example": "Toss the salad and chill it overnight until the flavors are intermingled.", "example_ko": "샐러드를 버무리고 맛이 섞일 때까지 하룻밤 동안 차게 두어라."}], "id": 218, "mnemonic": ""}, {"day": 4, "num": 51, "word": "succulent", "pron": "sʌkjulənt", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["juicy", "pulpy"], "meaning": "즙이 많은", "example": "Aloe is a plant that stores water in its succulent leaves.", "example_ko": "알로에는 즙이 많은 잎에 물을 저장하는 식물이다."}], "id": 219, "mnemonic": ""}, {"day": 4, "num": 52, "word": "homogeneous", "pron": "hòumədʒíːniəs", "stars": 1, "derivatives": ["v. homogenize"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["unvarying", "akin"], "meaning": "동종의, 균질의", "example": "The new apartment building is composed of one hundred homogeneous units.", "example_ko": "그 새로운 아파트 건물은 100개의 동종 가구들로 구성되어 있다."}], "id": 220, "mnemonic": ""}, {"day": 4, "num": 53, "word": "era", "pron": "íərə", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["period", "epoch", "age"], "meaning": "시대", "example": "The microchip initiated the era of the personal computer.", "example_ko": "마이크로칩은 개인 컴퓨터의 시대를 열었다."}], "id": 221, "mnemonic": ""}, {"day": 4, "num": 54, "word": "threat", "pron": "θret", "stars": 1, "derivatives": ["v. threaten"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["intention to harm", "menace"], "meaning": "위협", "example": "Rabbits' large ears give them excellent hearing that allows them to detect any threats in their environment.", "example_ko": "토끼의 큰 귀는 주변 환경의 어떤 위협도 감지할 수 있도록 하는 뛰어난 청력을 준다."}], "id": 222, "mnemonic": ""}, {"day": 4, "num": 55, "word": "foul", "pron": "faul", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["pollute", "contaminate"], "meaning": "더럽히다", "example": "During the Industrial Revolution, the smoke from factories fouled the air of many urban areas.", "example_ko": "산업 혁명 동안 공장에서 나오는 연기는 많은 도시 지역의 공기를 더럽혔다."}], "id": 223, "mnemonic": ""}, {"day": 4, "num": 56, "word": "prey", "pron": "prei", "stars": 1, "derivatives": [], "exam_tip": "prey는 명사가 아닌 동사로도 많이 쓰인다. 동사로는 'prey on the weak(약자들을 착취하다)'에서처럼 '착취하다'라는 뜻으로 주로 쓰이며, 동의어로는 take advantage of, exploit가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "n.", "synonyms": ["victim"], "meaning": "희생자", "example": "Elderly people are often the prey of phone scams and identity theft.", "example_ko": "노인들은 종종 전화 사기와 신원 도용의 희생자가 된다."}], "id": 224, "mnemonic": ""}, {"day": 4, "num": 57, "word": "practically", "pron": "prǽktikəli", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["nearly"], "meaning": "거의", "example": "By the 1970s, brown pelicans were practically extinct in the US.", "example_ko": "1970년대에 갈색 펠리컨은 미국에서 거의 멸종되었다."}], "id": 225, "mnemonic": ""}, {"day": 5, "num": 1, "word": "compelling", "pron": "kəmpéliŋ", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["convincing", "persuasive", "cogent"], "meaning": "설득력 있는", "example": "The speaker made some compelling arguments against immigration reform.", "example_ko": "그 연설자는 이민 계획에 반대하는 몇 가지 설득력 있는 주장을 펼쳤다."}], "id": 226, "mnemonic": ""}, {"day": 5, "num": 2, "word": "ultimately", "pron": "ʌ́ltəmətli", "stars": 3, "derivatives": ["adj. ultimate"], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["eventually", "finally", "in the end", "lastly"], "meaning": "마침내, 결국", "example": "After submitting his book to numerous publishers, the author ultimately succeeded in getting it published.", "example_ko": "그 작가는 자신의 책을 수많은 출판사에 제출한 후에 마침내 그 책을 출판하는 데 성공했다."}], "id": 227, "mnemonic": ""}, {"day": 5, "num": 3, "word": "bulk", "pron": "bʌlk", "stars": 3, "derivatives": [], "exam_tip": "bulk의 형용사형인 bulky는 '부피가 큰'이라는 뜻이며, 동의어로는 huge, enormous가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "n.", "synonyms": ["mass", "large quantity", "great quantity"], "meaning": "큰 규모, 대량", "example": "Buying its supplies in bulk, the department store chain was able to sell for less than its competitors.", "example_ko": "대량으로 물품을 구매함으로써 그 백화점 체인점은 경쟁 업체들보다 더 싼 값에 판매할 수 있었다."}, {"pos": "n.", "synonyms": ["majority", "main part"], "meaning": "대부분", "example": "Although the bulk of the movie was boring, parts of it were funny.", "example_ko": "그 영화의 대부분은 지루했지만, 몇 부분은 재미있었다."}], "id": 228, "mnemonic": ""}, {"day": 5, "num": 4, "word": "incompatible", "pron": "ìnkəmpǽtəbl", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["in conflict", "discrepant", "contradictory"], "meaning": "양립할 수 없는", "example": "Budget proposals submitted by different political parties are usually incompatible.", "example_ko": "다른 정당들에 의해 제출된 예산안들은 대개 양립할 수 없다."}], "id": 229, "mnemonic": ""}, {"day": 5, "num": 5, "word": "substantially", "pron": "səbstǽnʃəli", "stars": 3, "derivatives": ["adj. substantial"], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["significantly", "considerably"], "meaning": "상당히", "example": "In the mid-1800s, the enrollment of females in American schools increased substantially.", "example_ko": "1800년대 중반에 미국 학교에서 여성의 입학이 상당히 증가했다."}, {"pos": "adv.", "synonyms": ["largely", "mainly"], "meaning": "대체로", "example": "Analysts expect the political situation to remain substantially the same over the next few years.", "example_ko": "분석가들은 향후 몇 년 동안 정치적 상황이 대체로 같은 상태일 것이라고 예상한다."}], "id": 230, "mnemonic": ""}, {"day": 5, "num": 6, "word": "seek", "pron": "siːk", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["look for", "search for", "pursue"], "meaning": "찾다, 조사하다", "example": "The investigator sought the truth regardless of the consequences.", "example_ko": "그 수사관은 그것이 미칠 결과에 상관없이 진실을 조사했다."}, {"pos": "v.", "synonyms": ["attempt", "try", "essay"], "meaning": "시도하다, 노력하다", "example": "Governments must seek to balance the interests of diverse social groups.", "example_ko": "정부는 다양한 사회 집단들의 이해관계가 균형을 이루도록 노력해야 한다."}], "id": 231, "mnemonic": ""}, {"day": 5, "num": 7, "word": "unanticipated", "pron": "ʌ̀næntísəpèitid", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["not expected", "unforeseen"], "meaning": "예상하지 못한", "example": "It is important to save money for unanticipated expenses.", "example_ko": "예상하지 못한 지출을 위해 저축하는 것은 중요하다."}], "id": 232, "mnemonic": ""}, {"day": 5, "num": 8, "word": "merge", "pron": "məːrdʒ", "stars": 3, "derivatives": [], "exam_tip": "merge와 발음이 비슷한 emerge는 '나타나다(appear, loom)'라는 뜻이므로 시험에서 혼동하지 않도록 주의하자.", "senses": [{"pos": "v.", "synonyms": ["combine", "blend", "fuse"], "meaning": "합치다, 융합하다", "example": "The team members decided to merge their ideas and make the presentation together.", "example_ko": "팀원들은 그들의 생각을 같이하기로 결정했다."}], "id": 233, "mnemonic": ""}, {"day": 5, "num": 9, "word": "encounter", "pron": "inkáuntər", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["meet (with)", "experience", "confront", "face"], "meaning": "마주치다, 부딪치다", "example": "Bill encountered many obstacles that delayed the publication of his book.", "example_ko": "Bill은 그의 책의 출판을 지연시키는 많은 장애물에 마주쳤다."}], "id": 234, "mnemonic": ""}, {"day": 5, "num": 10, "word": "residue", "pron": "rézədjùː", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["remains", "remnant", "remainder"], "meaning": "잔여물", "example": "Chalky residue on the sole of Vincent's shoe proved that he had recently visited the murder scene.", "example_ko": "Vincent의 신발 밑창에 묻어 있는 가루 같은 잔여물은 그가 최근에 살인 현장에 다녀왔다는 것을 증명했다."}], "id": 235, "mnemonic": ""}, {"day": 5, "num": 11, "word": "circumstance", "pron": "sə́ːrkəmstæns", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["condition", "situation"], "meaning": "상황", "example": "There are no circumstances under which rare books are allowed out of the library.", "example_ko": "희귀 서적들을 도서관 밖으로 가지고 나갈 수 있는 상황은 절대로 없다."}], "id": 236, "mnemonic": ""}, {"day": 5, "num": 12, "word": "astonishing", "pron": "əstániʃiŋ", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["incredible", "amazing", "startling", "astounding"], "meaning": "놀라운, 눈부신", "example": "Estonia's geography is astonishing because of its unusual and diverse mix of landscapes.", "example_ko": "에스토니아의 지형은 특이하고 다양한 풍경의 조합 때문에 놀랍다."}], "id": 237, "mnemonic": ""}, {"day": 5, "num": 13, "word": "intermittently", "pron": "intərmítntli", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["occasionally", "periodically", "from time to time"], "meaning": "간헐적으로", "example": "In eastern North America, it rains intermittently throughout the year.", "example_ko": "북미 동부에서는 일 년 내내 간헐적으로 비가 내린다."}], "id": 238, "mnemonic": ""  [{"pos": "n.", "synonyms": ["supposition", "conjecture", "surmise"], "meaning": "추측", "example": "There was much speculation in the office as to who the new employee would be.", "example_ko": "신입 사원이 누가 될지에 대해 사무실 내에서 많은 추측이 있었다."}], "id": 248, "mnemonic": ""}, {"day": 5, "num": 24, "word": "compound", "pron": "kəmpáund", "stars": 2, "derivatives": [], "exam_tip": "compound는 동사가 아닌 명사로도 많이 쓰인다. 명사로는 'a compound of copper and zinc(구리와 아연의 혼합물)'에서처럼 '혼합물'이라는 뜻으로 주로 쓰이며, 동의어로는 mixture, blend가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "v.", "synonyms": ["add to", "intensify", "worsen"], "meaning": "(정도를) 더하다, 악화시키다", "example": "The doctor said that scratching an insect bite would only compound the itchiness.", "example_ko": "의사는 벌레에 물린 데를 긁는 것은 가려움의 정도를 더할 뿐이라고 말했다."}], "id": 249, "mnemonic": ""}, {"day": 5, "num": 25, "word": "fascinating", "pron": "fǽsənèitiŋ", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["extremely attractive", "captivating", "enthralling"], "meaning": "매혹적인", "example": "Jackson Pollock's paintings are characterized by fascinating combinations of colors and shapes.", "example_ko": "잭슨 폴록의 그림은 색채와 형태의 매혹적인 조합으로 특징지어진다."}], "id": 250, "mnemonic": ""}, {"day": 5, "num": 26, "word": "constellation", "pron": "kànstəléiʃən", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["collection", "combination", "group"], "meaning": "(유사한 것들의) 모임, 무리", "example": "Jerusalem is a city that is known for its constellation of cultures.", "example_ko": "예루살렘은 문화들의 모임으로 알려져 있는 도시이다."}], "id": 251, "mnemonic": ""}, {"day": 5, "num": 27, "word": "unconsolidated", "pron": "ʌ̀nkənsálədèitid", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["loose", "incoherent"], "meaning": "굳지 않은", "example": "Erosion rates are highest in places with unconsolidated soil.", "example_ko": "침식률은 굳지 않은 토양이 있는 지역에서 가장 높다."}], "id": 252, "mnemonic": ""}, {"day": 5, "num": 28, "w adj.", "synonyms": ["contentious", "argumentative", "quarrelsome"], "meaning": "논쟁을 좋아하는", "example": "The disagreement got heated quickly because both people involved were highly disputatious.", "example_ko": "관련된 두 사람 모두가 매우 논쟁을 좋아했기 때문에 논쟁은 빠르게 격앙되었다."}], "id": 257, "mnemonic": ""}, {"day": 5, "num": 33, "word": "diverse", "pron": "dáivəːrs", "stars": 2, "derivatives": ["n. diversity"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["varied", "various", "manifold", "dissimilar"], "meaning": "다양한; 다른", "example": "Russell's genius lies in getting people of diverse backgrounds to work together.", "example_ko": "Russell의 천재성은 다양한 배경의 사람들이 함께 일하도록 만드는 데 있다."}], "id": 258, "mnemonic": ""}, {"day": 5, "num": 34, "word": "eerie", "pron": "íəri", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["odd", "strange"], "meaning": "기묘한", "example": "The book 1984 was an eerie prediction of the future.", "example_ko": "'1984'이라는 책은 미래에 대한 기묘한 예견이었다."}], "id": 259, "mnemonic": ""}, {"day": 5, "num": 35, "word": "tenuous", "pron": "ténjuəs", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["weak", "insubstantial"], "meaning": "빈약한", "example": "Germany provided a tenuous justification for its invasion of Poland in 1939.", "example_ko": "독일은 1939년 폴란드 침공에 대해 빈약한 변명을 내놓았다."}], "id": 260, "mnemonic": ""}, {"day": 5, "num": 36, "word": "eradicate", "pron": "irǽdəkèit", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["(completely) remove", "root up", "extirpate", "eliminate"], "meaning": "근절하다", "example": "The US spends $50 billion per year trying to eradicate drug use.", "example_ko": "미국은 마약의 사용을 근절하기 위해 일 년에 500억 달러를 쓴다."}], "id": 261, "mnemonic": ""}, {"day": 5, "num": 37, "word": "prone to", "pron": "", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "phr.", "synonyms": ["susceptible to", "likely to get"], "meaning": "~하기 쉬운", "example": "Young children are prone to illness because their immune systems are not well developed.", "example_ko": "어린 아이들은 면역 체계가 잘 발달되어 있지 않아서 질병에 걸리기 쉽다."}], "id": 262, "mnemonic": ""}, {"day": 5, "num": 38, "word": "lodge", "pron": "ladʒ", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["embed", "implant"], "meaning": "박히다", "example": "The meteor flew in from outer space and lodged in the rock.", "example_ko": "유성이 우주 공간에서 날아와서 암석에 박혔다."}], "id": 263, "mnemonic": ""}, {"day": 5, "num": 39, "word": "gather momentum", "pron": "", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "phr.", "synonyms": ["make progress", "gain impetus"], "meaning": "탄력이 붙다", "example": "Business at the new book shop was slow at first, but soon it started to gather momentum.", "example_ko": "신규 서점에서의 사업은 처음에는 부진했지만 곧 탄력이 붙기 시작했다."}], "id": 264, "mnemonic": ""}, {"day": 5, "num": 40, "word": "viable", "pron": "váiəbl", "stars": 2, "derivatives": ["n. viability"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["able to survive"], "meaning": "생존 가능한", "example": "A fetus is considered viable after it has endured 20 weeks inside the womb.", "example_ko": "태아는 자궁 안에서 20주를 견딘 후에 생존 가능하다고 여겨진다."}], "id": 265, "mnemonic": ""}, {"day": 5, "num": 41, "word": "impediment", "pron": "impédəmənt", "stars": 2, "derivatives": ["v. impede"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["obstacle", "obstruction", "barrier"], "meaning": "장애물", "example": "If Ben puts his mind to something, no impediment can stop him from reaching his goals.", "example_ko": "Ben이 어떤 일을 하려고 마음먹으면, 어떤 장애물도 그가 목표를 달성하는 것을 막을 수 없다."}], "id": 266, "mnemonic": ""}, {"day": 5, "num": 42, "word": "arid", "pron": "ǽrid", "stars": 2, "derivatives": ["n. aridity"], "exam_tip": "arid의 철자가 비슷한 acrid는 '(냄새나 맛 등이) 매운, 꼭 쓰는 듯한(pungent)'이라는 뜻이므로 시험에서 혼동하지 않도록 주의하자.", "senses": [{"pos": "adj.", "synonyms": ["dry", "barren", "sterile", "waterless"], "meaning": "메마른", "example": "To perform a construction project in an arid desert, a great amount of water is needed.", "example_ko": "메마른 사막에서 건설 프로젝트를 수행하기 위해서는 엄청난 양의 물이 필요하다."}], "id": 267, "mnemonic": ""}, {"day": 5, "num": 43, "word": "credible", "pron": "krédəbl", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["believable", "reliable", "plausible"], "meaning": "믿을 수 있는", "example": "Internet websites are not always credible sources of information.", "example_ko": "인터넷 웹사이트가 항상 믿을 수 있는 정보의 출처는 아니다."}], "id": 268, "mnemonic": ""}, {"day": 5, "num": 44, "word": "vacate", "pron": "véikeit", "stars": 2, "derivatives": ["adj. vacant"], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["abandon", "evacuate", "void"], "meaning": "떠나다, 비우다", "example": "The typhoon forced residents to vacate the area near the coast.", "example_ko": "태풍은 거주민들이 해안 근처 지역을 떠나도록 만들었다."}], "id": 269, "mnemonic": ""}, {"day": 5, "num": 45, "word": "cushion", "pron": "kúʃən", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["protect", "buffer"], "meaning": "보호하다, 충격을 완화하다", "example": "Exercise shoes have a layer of foam that cushions the foot from the impact of running.", "example_ko": "운동화에는 달리기의 충격으로부터 발을 보호하는 발포 고무층이 있다."}], "id": 270, "mnemonic": ""}, {"day": 5, "num": 46, "word": "peculiar", "pron": "pikjúːljər", "stars": 1, "derivatives": ["n. peculiarity"], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["unique", "distinct", "particular"], "meaning": "특유의 독특한", "example": "The idiomatic expression is peculiar to the British dialect of the English language.", "example_ko": "그 관용 표현은 영국식 영어 방언 특유의 표현이다."}, {"pos": "adj.", "synonyms": ["strange", "unusual", "odd"], "meaning": "이상한", "example": "The zoologists were puzzled by the animal's peculiar behavior.", "example_ko": "동물학자들은 그 동물의 이상한 행동에 어리둥절했다."}], "id": 271, "mnemonic": ""}, {"day": 5, "num": 47, "word": "attributable to", "pron": "", "stars": 1, "derivatives": [], "exam_tip" g dress allowing it to drape more loosely about her shoulders.", "example_ko": "재단사는 Kelly의 어깨에 더 느슨하게 드리워지도록 그녀의 웨딩드레스에 변화를 주었다."}], "id": 294, "mnemonic": ""}, {"day": 6, "num": 14, "word": "consequence", "pron": "kánsəkwèns", "stars": 3, "derivatives": ["adj. consequent", "adv. consequently"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["result", "effect", "ramification", "outcome"], "meaning": "결과", "example": "The economic depression in the US was unique in its consequences.", "example_ko": "미국의 경제 불황은 그 결과적 측면에서 독특했다."}, {"pos": "n.", "synonyms": ["importance", "significance"], "meaning": "중요성", "example": "Electing a president is a decision of great consequence for a country.", "example_ko": "대통령을 선출하는 것은 국가에서 굉장한 중요성을 갖는 결정이다."}], "id": 295, "mnemonic": ""}, {"day": 6, "num": 15, "word": "deceive", "pron": "disíːv", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["mislead", "delude", "cheat"], "meaning": "속이다", "example": "The company was accused of engaging in a deliberate effort to deceive its shareholders.", "example_ko": "그 회사는 주주들을 속이려는 의도적인 활동에 가담한 것으로 기소되었다."}], "id": 296, "mnemonic": ""}, {"day": 6, "num": 16, "word": "ample", "pron": "æmpl", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["sizable", "large", "spacious", "vast"], "meaning": "넓은, 광대한", "example": "The backyard of the house has ample room for a swimming pool and a large garden.", "example_ko": "그 집의 뒷마당에는 수영장과 큰 정원을 위한 넓은 공간이 있다."}, {"pos": "adj.", "synonyms": ["plentiful", "abundant", "more than enough"], "meaning": "풍부한", "example": "Richard stocks his refrigerator with an ample supply of food and beverages for unexpected guests.", "example_ko": "Richard는 예상치 못한 손님에 대비해 냉장고 안에 풍부한 양의 음식과 음료를 채워 둔다."}], "id": 297, "mnemonic": ""}, {"day": 6, "num": 17, "word": "resilient", "pron": "rizíljənt", "stars": 3, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["quick to recover", "easy to recover"], "meaning": "금방 회복하는", "example": "After injury, young people are usually more resilient than old people.", "example_ko": "부상 후에 젊은 사람들이 보통 나이 든 사람들보다 더 금방 회복한다."}], "id": 298, "mnemonic": ""}, {"day": 6, "num": 18, "word": "detach", "pron": "ditætʃ", "stars": 2, "derivatives": [], "exam_tip": "detach의 명사형인 detachment는 '분리'라는 뜻 외에도 '무관심'이라는 뜻으로 많이 쓰이며, 동의어로는 unconcern, indifference가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "v.", "synonyms": ["separate", "disconnect", "disengage"], "meaning": "분리하다", "example": "The inner lining of the coat can be detached to make the coat less bulky.", "example_ko": "코트의 부피를 줄이기 위해서 그 코트의 안감은 분리될 수 있다."}], "id": 299, "mnemonic": ""}, {"day": 6, "num": 19, "word": "account", "pron": "əkáunt", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["description", "report", "narrative"], "meaning": "(사건 등에 대한) 기술, 보고", "example": "John Reed wrote a famous account of the Russian Revolution.", "example_ko": "존 리드는 러시아 혁명에 관한 유명한 기술서를 썼다."}], "id": 300, "mnemonic": ""}, {"day": 6, "num": 20, "word": "equilibrium", "pron": "ìːkwəlíbriəm", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["balance", "symmetry"], "meaning": "균형", "example": "A market is considered to be stable when supply and demand are in equilibrium.", "example_ko": "시장은 공급과 수요가 균형 상태에 있을 때 안정적이라고 여겨진다."}], "id": 301, "mnemonic": ""}, {"day": 6, "num": 21, "word": "surmise", "pron": "sərmáiz", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["infer", "guess", "speculate", "suspect"], "meaning": "추측하다", "example": "Without any hard evidence to rely upon, researchers can only surmise how the death of King Tutankhamen occurred.", "example_ko": "어떤 신뢰할 만한 확실한 근거가 없기 때문에, 연구자들은 투탕카멘 왕의 죽음이 어떻게 일어났는지 추측만 할 수 있을 뿐이다."}], "id": 302, "mnemonic": ""}, {"day": 6, "num": 22, "word": "unsuitable", "pron": "ʌnsúːtəbl", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["inappropriate", "unfit", "improper"], "meaning": "적합하지 않은", "example": "Films that are rated R are unsuitable for children under the age of 17.", "example_ko": "R 등급이 매겨진 영화는 17세 미만의 아이들에게 적합하지 않다."}], "id": 303, "mnemonic": ""}, {"day": 6, "num": 23, "word": "imaginative", "pron": "imǽdʒənətiv", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["creative", "inventive", "original"], "meaning": "창의적인", "example": "Imaginative people often find unconventional solutions to difficult problems.", "example_ko": "창의적인 사람들은 종종 어려운 문제에 대한 색다른 해결책을 찾아낸다."}], "id": 304, "mnemonic": ""}, {"day": 6, "num": 24, "word": "imposing", "pron": "impóuziŋ", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["impressive", "striking"], "meaning": "인상적인", "example": "The Empire State Building is an imposing structure situated in the heart of New York City.", "example_ko": "엠파이어 스테이트 빌딩은 뉴욕 시의 심장부에 위치한 인상적인 건축물이다."}], "id": 305, "mnemonic": ""}, {"day": 6, "num": 25, "word": "vitality", "pron": "vaitǽləti", "stars": 2, "derivatives": ["adj. vital"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["energy", "liveliness", "vigor"], "meaning": "활력", "example": "A person's vitality is affected by what he or she eats and how much sleep he or she gets.", "example_ko": "사람의 활력은 그가 무엇을 먹는지와 얼마나 많이 취하는지에 영향을 받는다."}], "id": 306, "mnemonic": ""}, {"day": 6, "num": 26, "word": "vehicle", "pron": "víːikl", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["means", "medium", "instrument"], "meaning": "수단, 매체", "example": "In democracies, voting is the primary vehicle for social change.", "example_ko": "민주주의에서 투표는 사회적 변화를 위한 주된 수단이다."}], "id": 307, "mnemonic": ""}, {"day": 6, "num": 27, "word": "hitherto", "pron": "híðərtùː", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["previously", "so far", "until now"], "meani senses": [{"pos": "v.", "synonyms": ["get worse", "degenerate"], "meaning": "악화되다", "example": "My grandmother's health deteriorated last year, but she's much better now.", "example_ko": "작년에 할머니의 건강이 악화되었지만 지금은 많이 나아지셨다."}], "id": 313, "mnemonic": ""}, {"day": 6, "num": 33, "word": "assault", "pron": "əsɔ́ːlt", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["attack", "aggress", "assail"], "meaning": "폭행하다, 공격하다", "example": "John was arrested last night because he assaulted his neighbor during a noise dispute.", "example_ko": "John은 소음 때문에 논쟁을 하다가 이웃을 폭행해서 어젯밤에 구속되었다."}], "id": 314, "mnemonic": ""}, {"day": 6, "num": 34, "word": "appropriate", "pron": "əpróupriət", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["suitable", "proper", "applicable"], "meaning": "적절한", "example": "Brittany's clothes were not appropriate for a job interview.", "example_ko": "Brittany의 옷은 취업 면접용으로 적절하지 않았다."}], "id": 315, "mnemonic": ""}, {"day": 6, "num": 35, "word": "adept", "pron": "ədépt", "stars": 2, "derivatives": [], "exam_tip": "adept와 철자와 발음이 비슷한 adapt는 '적응하다(adjust, accommodate)'라는 뜻이므로 시험에서 혼동하지 않도록 주의하자.", "senses": [{"pos": "adj.", "synonyms": ["skillful", "proficient", "deft", "adroit"], "meaning": "능숙한", "example": "The restaurant's new chef is adept at preparing both Italian and French cuisine.", "example_ko": "그 식당의 새 요리사는 이탈리아 요리와 프랑스 요리 둘 다 조리하는 데 능숙하다."}], "id": 316, "mnemonic": ""}, {"day": 6, "num": 36, "word": "indeed", "pron": "indíːd", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["in truth", "in fact"], "meaning": "사실은", "example": "Indeed, technological innovations have dramatically reduced the demand for manual labor.", "example_ko": "사실, 기술 혁신은 육체 노동의 수요를 급격하게 감소시켰다."}], "id": 317, "mnemonic": ""}, {"day": 6, "num": 37, "word": "pursuit", "pron": "pərsúːt", "stars": 2, "derivatives": ["v. pursue"], "exam_tip": "pursuit는 'the pursuit of happiness(행복의 추구)'에서처럼 '추구'라는 뜻으로도 많이 쓰인다. 동의어로는 search, quest가 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "n.", "synonyms": ["interest", "pastime", "hobby"], "meaning": "취미, 오락", "example": "Pursuits such as playing cards or reading books can prevent dementia in the elderly.", "example_ko": "카드놀이나 독서 같은 취미는 노인들이 치매에 걸리는 것을 예방할 수 있다."}], "id": 318, "mnemonic": ""}, {"day": 6, "num": 38, "word": "incite", "pron": "insáit", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["stimulate", "provoke", "inflame", "spur"], "meaning": "자극하다", "example": "The love poem incited Todd's emotions and he asked his girlfriend to marry him.", "example_ko": "그 연애시는 Todd의 감정을 자극했고, 그는 여자친구에게 청혼했다."}], "id": 319, "mnemonic": ""}, {"day": 6, "num": 39, "word": "guarantee", "pron": "gæ̀rəntíː", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["ensure", "secure", "warrant"], "meaning": "보장하다", "example": "The linking of medical institutions will guarantee better health care systems.", "example_ko": "의료 기관들의 연계는 더 나은 보건 제도를 보장할 것이다."}], "id": 320, "mnemonic": ""}, {"day": 6, "num": 40, "word": "prosperity", "pron": "prɑspérəti", "stars": 2, "derivatives": ["v. prosper"], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["economic well-being", "wealth", "fortune"], "meaning": "번영", "example": "In the 1800s, economic freedom brought the US great prosperity.", "example_ko": "1800년대에는 경제적 자유가 미국에 큰 번영을 가져왔다."}], "id": 321, "mnemonic": ""}, {"day": 6, "num": 41, "word": "primarily", "pron": "praimérəli", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["mostly", "mainly", "chiefly"], "meaning": "주로", "example": "Members of the country club were primarily wealthy old men.", "example_ko": "컨트리 클럽의 회원들은 주로 부유한 나이 많은 남성들이었다."}, {"pos": "adv.", "synonyms": ["originally", "at first", "initially"], "meaning": "원래, 처음에", "example": "The Republican Party was primarily created to stop the spread of slavery.", "example_ko": "공화당은 원래 노예 제도의 확산을 막기 위해 만들어졌다."}], "id": 322, "mnemonic": ""}, {"day": 6, "num": 42, "word": "erupt", "pron": "irʌ́pt", "stars": 2, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["explode", "burst", "blow up"], "meaning": "폭발하다", "example": "In 1980, Mount St. Helens erupted and destroyed the surrounding forest.", "example_ko": "1980년에 세인트 헬렌스 산이 폭발해서 인근의 숲을 파괴했다."}], "id": 323, "mnemonic": ""}, {"day": 6, "num": 43, "word": "trace", "pron": "treis", "stars": 1, "derivatives": [], "exam_tip": "trace는 명사가 아닌 동사로도 많이 쓰인다. 동사로는 'trace the suspicious man(수상한 남자를 추적하다)'에서처럼 '추적하다'라는 뜻으로 주로 쓰이며, 동의어로는 track down, trail이 출제될 수 있으니 함께 알아두도록 하자.", "senses": [{"pos": "n.", "synonyms": ["evidence", "vestige", "imprint", "mark"], "meaning": "자취, 흔적", "example": "The results of the blood test showed traces of an illegal drug in the patient's blood.", "example_ko": "혈액 검사 결과는 환자의 혈액에서 불법적인 약물의 흔적을 보여주었다."}], "id": 324, "mnemonic": ""}, {"day": 6, "num": 44, "word": "prestigious", "pron": "prestídʒəs", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "adj.", "synonyms": ["highly regarded", "esteemed", "respected"], "meaning": "명성이 있는", "example": "Harvard University is one of the most prestigious colleges in North America.", "example_ko": "하버드 대학교는 북미에서 가장 명성이 있는 대학 중 하나이다."}], "id": 325, "mnemonic": ""}, {"day": 6, "num": 45, "word": "shape", "pron": "ʃeip", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["affect", "form", "influence"], "meaning": "(영향을 미쳐) 형성하다", "example": "Experiences that occur during childhood can shape a person's personality.", "example_ko": "유년기에 일어나는 경험들은 한 사람의 성격을 형성할 수 있다."}], "id": 326, "mnemonic": ""}, {"day": 6, "num": 46, "word": "inflict", "pron": "inflíkt", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["cause", "administer", "exact"], "meaning": "(고통 등을) 주다, 가하다", "example": "Harsh weather can inflict serious damage on fruit crops.", "example_ko": "혹독한 날씨는 유실 작물에 심각한 피해를 줄 수 있다."}], "id": 327, "mnemonic": ""}, {"day": 6, "num": 47, "word": "portion", "pron": "pɔ́ːrʃən", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["part", "segment", "fragment"], "meaning": "부분", "example": "Some portions of the massive sculpture are made of metal, while others are made of stone.", "example_ko": "그 거대한 조각상의 어떤 부분은 금속으로 만들어졌으며, 다른 부분들은 석재로 만들어졌다."}], "id": 328, "mnemonic": ""}, {"day": 6, "num": 48, "word": "coincidence", "pron": "kouínsidəns", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "n.", "synonyms": ["chance happening"], "meaning": "우연의 일치", "example": "According to the police, the suspect's presence during the robbery was a coincidence.", "example_ko": "경찰에 따르면 강도 사건이 일어났을 때 그곳에 용의자가 있었던 것은 우연의 일치였다."}], "id": 329, "mnemonic": ""}, {"day": 6, "num": 49, "word": "propel", "pron": "prəpél", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["push", "force", "drive", "impel"], "meaning": "몰아대다", "example": "The store's security guard propelled the unruly customer out the door.", "example_ko": "그 상점의 경비는 제멋대로인 고객을 문 밖으로 몰아냈다."}], "id": 330, "mnemonic": ""}, {"day": 6, "num": 50, "word": "thoroughly", "pron": "θə́ːrouli", "stars": 1, "derivatives": ["adj. thorough"], "exam_tip": "", "senses": [{"pos": "adv.", "synonyms": ["completely", "entirely"], "meaning": "철저히, 완전히", "example": "The professor covered the collapse of the Mayan civilization thoroughly in class.", "example_ko": "교수는 수업 시간에 마야 문명의 멸망에 대해 철저히 다루었다."}], "id": 331, "mnemonic": ""}, {"day": 6, "num": 51, "word": "contemplate", "pron": "kɑ́ntəmplèit", "stars": 1, "derivatives": [], "exam_tip": "", "senses": [{"pos": "v.", "synonyms": ["consider", "ponder"], "meaning": "곰곰이 생각하다", "example": "John accepted a teaching position in Vancouver while he contemplated the future.", "example_ko": "John은 미래에 대해 곰곰이 생각하면서 밴쿠버에서 교직을 받아들였다
