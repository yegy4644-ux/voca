<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#16a34a">
<title>초록이 보카</title>
<style>
  :root{
    --green:#16a34a; --green-d:#15803d; --bg:#0f172a; --card:#1e293b;
    --card2:#334155; --text:#e2e8f0; --muted:#94a3b8; --ok:#22c55e; --no:#ef4444;
    --accent:#38bdf8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow-x:hidden}
  .example,.mn,.qword{overflow-wrap:break-word;word-break:break-word}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  header{
    background:var(--green); padding:12px 16px; display:flex; align-items:center;
    justify-content:space-between; box-shadow:0 2px 10px rgba(0,0,0,.3); position:sticky; top:0; z-index:10;
  }
  header h1{font-size:18px; margin:0; font-weight:800; letter-spacing:-.5px}
  header .stat{font-size:12px; opacity:.9}
  main{flex:1; padding:16px; max-width:720px; width:100%; margin:0 auto}
  .hidden{display:none!important}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:14px; font-weight:700}
  .grid{display:grid; gap:12px}

  /* home */
  .progress-bar{height:10px;background:var(--card2);border-radius:99px;overflow:hidden;margin:10px 0 4px}
  .progress-bar > div{height:100%;background:var(--green);transition:width .4s}
  .modes{grid-template-columns:1fr 1fr; margin-top:18px}
  .mode-btn{
    background:var(--card); color:var(--text); padding:20px 14px; text-align:left;
    border:1px solid var(--card2); min-height:104px; display:flex; flex-direction:column; justify-content:space-between;
    transition:transform .1s, border-color .2s;
  }
  .mode-btn:active{transform:scale(.97)}
  .mode-btn .ico{font-size:26px}
  .mode-btn .t{font-size:16px;font-weight:800;margin-top:8px}
  .mode-btn .d{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}
  .mode-btn .badge{font-size:12px;color:var(--accent);font-weight:800}

  .panel{background:var(--card);border:1px solid var(--card2);border-radius:16px;padding:16px;margin-top:14px}
  .panel h3{margin:0 0 10px;font-size:14px;color:var(--muted);font-weight:700}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  label.lab{font-size:13px;color:var(--muted)}
  select,input[type=number]{
    background:var(--card2);color:var(--text);border:none;border-radius:10px;padding:8px 10px;font-size:14px;font-family:inherit
  }
  .ghost{background:var(--card2);color:var(--text);padding:10px 14px;font-size:13px}
  .small{font-size:12px;color:var(--muted)}

  /* study card */
  .card-wrap{display:flex;flex-direction:column;min-height:calc(100vh - 130px)}
  .timer{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .timer > div{height:100%;background:var(--accent);width:100%}
  .timer.warn > div{background:#f59e0b}
  .timer.danger > div{background:var(--no)}
  .qcard{
    flex:1;background:var(--card);border:1px solid var(--card2);border-radius:20px;padding:24px 18px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;cursor:pointer
  }
  .qword{font-size:40px;font-weight:900;letter-spacing:-1px;word-break:break-word}
  .spk{background:var(--card2);color:var(--accent);width:46px;height:46px;border-radius:99px;font-size:22px;margin-top:12px;line-height:1}
  .spk:active{transform:scale(.9)}
  .cpy{background:var(--card2);color:var(--muted);width:46px;height:46px;border-radius:99px;font-size:18px;margin-top:12px;margin-left:8px;line-height:1}
  .cpy:active{transform:scale(.9)}
  .cpy.mini{width:30px;height:30px;font-size:13px;margin-top:0;margin-left:0}
  .qcat{font-size:12px;color:var(--muted);background:var(--card2);padding:3px 10px;border-radius:99px}
  .qhint{color:var(--muted);font-size:13px;margin-top:10px}
  .reveal{width:100%;margin-top:14px;text-align:left;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .meaning{font-size:24px;font-weight:800;text-align:center;margin:4px 0 14px}
  .pron{color:var(--muted);font-size:15px;margin-top:2px}
  .stars{color:#fbbf24;font-size:13px;letter-spacing:2px}
  .sense{border-left:3px solid var(--card2);padding:2px 0 2px 12px;margin:10px 0}
  .sense .pos{display:inline-block;background:var(--card2);color:var(--accent);font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px;margin-right:6px}
  .sense .mn{font-size:19px;font-weight:800;display:inline}
  .example{background:var(--card2);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:14px;line-height:1.5}
  .example .en{color:var(--text)} .example .ko{color:var(--muted);margin-top:4px}
  .example b{color:var(--accent);font-weight:800}
  .deriv{font-size:12px;color:var(--muted);margin-top:8px}
  .deriv span{background:var(--card2);padding:2px 8px;border-radius:6px;margin-right:5px}
  .tipbtn{background:var(--card2);color:#fbbf24;font-size:13px;padding:8px 12px;border-radius:10px;margin-top:12px;width:100%;text-align:left}
  .tipbox{background:#422006;border:1px solid #a16207;border-radius:10px;padding:11px;margin-top:6px;font-size:13.5px;line-height:1.55;white-space:pre-wrap}
  .sec-title{font-size:12px;color:var(--muted);font-weight:700;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .syns{display:flex;flex-wrap:wrap;gap:7px}
  .syn{background:var(--card2);padding:6px 11px;border-radius:99px;font-size:14px}
  .syn.key{background:var(--accent);color:#04293a;font-weight:800}
  .nuance{background:#0b2a3a;border:1px solid var(--accent);border-radius:12px;padding:11px 12px;font-size:14px;line-height:1.55;color:#cfeaf6}
  .legend{font-size:11px;color:var(--muted);margin-top:6px}
  .legend b{color:var(--accent)}
  .ks{background:#13241a;border:1px solid #2f7d4f;border-radius:12px;padding:10px 12px;font-size:13.5px;line-height:1.65}
  .ks-head{color:#86efac;font-weight:800}
  .ks-syn{color:#b8c6d0;margin-top:4px}
  .ks-syn .kk{color:var(--accent);font-weight:700}
  .ks-badge{display:inline-block;background:#14532d;color:#86efac;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px}
  .mnemo{background:#422006;border:1px solid #a16207;border-radius:12px;padding:12px;font-size:15px;line-height:1.5;white-space:pre-wrap}
  .mnemo.empty{background:var(--card2);border-style:dashed;border-color:var(--muted);color:var(--muted);font-size:13px}
  textarea{
    width:100%;background:var(--card2);color:var(--text);border:1px solid var(--card2);border-radius:12px;
    padding:11px;font-size:15px;font-family:inherit;resize:vertical;min-height:72px;line-height:1.5
  }
  .grade{grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .gbtn{padding:18px;font-size:17px;color:#fff}
  .gbtn.no{background:var(--no)} .gbtn.ok{background:var(--ok)}
  .reveal-btn{width:100%;padding:16px;font-size:16px;background:var(--green);color:#fff;margin-top:14px}
  .controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .controls .idx{font-size:13px;color:var(--muted)}
  .controls .x{background:var(--card2);color:var(--text);width:36px;height:36px;border-radius:99px;font-size:16px;padding:0}

  /* quiz options */
  .opts{display:grid;gap:10px;margin-top:18px}
  .opt{background:var(--card);border:1px solid var(--card2);color:var(--text);padding:16px;font-size:16px;text-align:left}
  .opt.correct{background:var(--ok);color:#fff;border-color:var(--ok)}
  .opt.wrong{background:var(--no);color:#fff;border-color:var(--no)}
  .opt:disabled{opacity:1}

  /* sheet (시험지) */
  .sq{background:var(--card);border:1px solid var(--card2);border-radius:14px;padding:14px;margin-bottom:12px}
  .sqw{font-size:19px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sqsub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .sqopts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:10px}
  .sopt{background:var(--card2);color:var(--text);text-align:left;padding:11px 13px;border-radius:10px;font-size:15px;border:2px solid transparent}
  .sopt.sel{border-color:var(--accent)}
  .sopt.correct{background:var(--ok);color:#fff;border-color:var(--ok)}
  .sopt.wrong{background:var(--no);color:#fff;border-color:var(--no)}
  .spk.mini{width:30px;height:30px;font-size:14px;margin-top:0}
  .sheet-score{position:sticky;bottom:0;background:var(--green);color:#fff;text-align:center;font-weight:800;font-size:18px;padding:14px;border-radius:14px;margin-bottom:10px}

  /* done screen */
  .done{text-align:center;padding:40px 16px}
  .done .big{font-size:54px}
  .done h2{margin:10px 0 4px}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--card2);
    color:var(--text);padding:10px 18px;border-radius:99px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:50
  }
  .stat-grid{grid-template-columns:1fr 1fr 1fr;text-align:center}
  .stat-grid .s{background:var(--card2);border-radius:12px;padding:12px 6px}
  .stat-grid .n{font-size:22px;font-weight:900}
  .stat-grid .l{font-size:11px;color:var(--muted)}
  a.link{color:var(--accent);font-size:13px}
  .fullbtn{width:100%;padding:16px;font-size:16px;background:var(--green);color:#fff;margin-top:8px}
</style>
</head>
<body>
<header>
  <h1>🟢 초록이 보카</h1>
  <div class="stat" id="hstat"></div>
</header>
<main>
  <!-- HOME -->
  <section id="home">
    <div class="panel">
      <h3>전체 진도</h3>
      <div class="progress-bar"><div id="homeBar" style="width:0%"></div></div>
      <div class="row" style="justify-content:space-between">
        <span class="small" id="homeProg">0 / 0 외움</span>
        <span class="small" id="homeDue">오늘 복습 0개</span>
      </div>
    </div>

    <div class="panel">
      <h3>학습 범위</h3>
      <div class="row">
        <label class="lab">DAY</label>
        <select id="catSel"></select>
        <label class="lab">단어 수</label>
        <select id="countSel">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="30">30</option>
          <option value="50">50</option>
          <option value="9999">전체</option>
        </select>
      </div>
      <div class="row" style="margin-top:10px">
        <label class="lab">제한시간</label>
        <select id="timeSel">
          <option value="0">없음</option>
          <option value="5">5초</option>
          <option value="7" selected>7초</option>
          <option value="10">10초</option>
          <option value="15">15초</option>
        </select>
        <label class="lab"><input type="checkbox" id="newFirst" checked> 안 외운 것 우선</label>
        <label class="lab"><input type="checkbox" id="ksOnly"> 📖 경선식 있는 것만</label>
        <label class="lab"><input type="checkbox" id="autoSpeak" checked> 🔊 자동 발음</label>
      </div>
      <div class="row" style="margin-top:10px">
        <label class="lab">퀴즈 유형</label>
        <select id="quizType">
          <option value="syn" selected>동의어 고르기 (표제어→동의어)</option>
          <option value="mean">우리말 뜻 맞추기</option>
          <option value="mix">섞기</option>
        </select>
        <label class="lab"><input type="checkbox" id="sheetMode"> 📝 시험지 형식</label>
      </div>
    </div>

    <div class="grid modes">
      <button class="mode-btn" data-mode="study">
        <div class="ico">⏱️</div>
        <div><div class="t">외우기</div><div class="d">제한시간 + 자가체크</div></div>
      </button>
      <button class="mode-btn" data-mode="review">
        <div class="ico">🔁</div>
        <div><div class="t">복습</div><div class="d badge" id="reviewBadge">오늘 0개</div></div>
      </button>
      <button class="mode-btn" data-mode="syn">
        <div class="ico">🔗</div>
        <div><div class="t">동의어</div><div class="d">동의어 떠올리기</div></div>
      </button>
      <button class="mode-btn" data-mode="quiz">
        <div class="ico">✅</div>
        <div><div class="t">퀴즈</div><div class="d">영↔한 4지선다</div></div>
      </button>
    </div>

    <div class="panel">
      <h3>백업 / 복원 (기기 간 이동)</h3>
      <p class="small">진도와 경선식 연상법을 파일로 내보내고, 다른 기기에서 가져오세요.</p>
      <div class="row">
        <button class="ghost" id="exportBtn">📤 내보내기</button>
        <button class="ghost" id="importBtn">📥 가져오기</button>
        <button class="ghost" id="resetBtn">⚠️ 진도 초기화</button>
      </div>
      <input type="file" id="importFile" accept="application/json" class="hidden">
    </div>
    <p class="small" style="text-align:center;margin-top:18px"><span id="totalCount">0</span>단어 (DAY 1~7) · 진도는 이 브라우저에 저장됩니다</p>
  </section>

  <!-- STUDY / REVIEW / SYN -->
  <section id="study" class="hidden">
    <div class="controls">
      <button class="x" id="quitStudy">✕</button>
      <span class="idx" id="studyIdx"></span>
      <span class="idx" id="studyTitle"></span>
    </div>
    <div class="card-wrap">
      <div class="timer" id="timerBar"><div id="timerFill"></div></div>
      <div class="qcard" id="qcard"></div>
      <div id="afterArea"></div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="controls">
      <button class="x" id="quitQuiz">✕</button>
      <span class="idx" id="quizIdx"></span>
      <span class="idx" id="quizScore"></span>
    </div>
    <div class="qcard" style="min-height:120px;cursor:default" id="quizQ"></div>
    <div class="opts" id="quizOpts"></div>
  </section>

  <!-- SHEET (시험지) -->
  <section id="sheet" class="hidden">
    <div class="controls">
      <button class="x" id="quitSheet">✕</button>
      <span class="idx">📝 시험지</span>
      <span class="idx" id="sheetInfo">왼쪽 단어의 동의어를 고르세요</span>
    </div>
    <div id="sheetBody"></div>
  </section>

  <!-- DONE -->
  <section id="done" class="hidden">
    <div class="done">
      <div class="big" id="doneEmoji">🎉</div>
      <h2 id="doneTitle">완료!</h2>
      <p class="small" id="doneSub"></p>
      <div class="grid stat-grid" style="margin:20px 0">
        <div class="s"><div class="n" id="dOk">0</div><div class="l">알았음</div></div>
        <div class="s"><div class="n" id="dNo">0</div><div class="l">몰랐음</div></div>
        <div class="s"><div class="n" id="dDue">0</div><div class="l">남은 복습</div></div>
      </div>
      <button class="fullbtn" id="againBtn">다시</button>
      <button class="fullbtn ghost" id="homeBtn" style="background:var(--card2)">홈으로</button>
    </div>
  </section>
</main>

const LS_PROG = "voca_progress_v2";   // {id:{box,due,seen,ok,no,learned}}
const LS_MNEMO = "voca_mnemo_v2";     // {id:"경선식 연상법"}

/* ---- storage ---- */
const load = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) || def; } catch { return def; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
let prog = load(LS_PROG, {});
let mnemo = load(LS_MNEMO, {});

/* ---- date / SRS ---- */
const todayStr = () => { const d = new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); };
const dayNum = () => Math.floor((Date.now() - new Date().getTimezoneOffset()*60000) / 86400000);
const INTERVALS = [0, 1, 2, 4, 7, 15, 30];

function getP(id){ return prog[id] || {box:0, due:0, seen:0, ok:0, no:0, learned:false}; }
function isDue(id){ const p = prog[id]; return p && p.learned && p.due <= dayNum(); }
function isLearned(id){ const p = prog[id]; return p && p.learned; }
function grade(id, correct){
  const p = getP(id);
  p.seen++;
  if(correct){ p.ok++; p.box = Math.min(p.box+1, INTERVALS.length-1); p.learned = true; }
  else { p.no++; p.box = 0; p.learned = true; }
  p.due = dayNum() + INTERVALS[p.box];
  prog[id] = p; save(LS_PROG, prog);
}

/* ---- word helpers (new schema with senses) ---- */
const DAYS = [...new Set(WORDS.map(w=>w.day))].sort((a,b)=>a-b);
const norm = s => (s+"").toLowerCase().replace(/\s+/g," ").trim();
function wMeaning(w){ return w.senses.map(s=>s.meaning).join(" / "); }
function wSyns(w){ const all=[]; w.senses.forEach(s=>s.synonyms.forEach(x=>{ if(!all.includes(x)) all.push(x); })); return all; }
function isKey(w,x){ return w.keys && w.keys.includes(norm(x)); }
function synChip(w,x){ return `<span class="syn${isKey(w,x)?' key':''}">${esc(x)}</span>`; }
function pickSyn(o){ const s=wSyns(o); return s.length? s[Math.floor(Math.random()*s.length)] : null; }

/* ---- 발음 (Web Speech API) ---- */
let VOICES=[];
function loadVoices(){ try{ VOICES=window.speechSynthesis.getVoices()||[]; }catch{} }
if("speechSynthesis" in window){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text){
  if(!("speechSynthesis" in window)){ toast("이 브라우저는 발음을 지원하지 않아요"); return; }
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.92;
    const v=VOICES.find(v=>/en[-_]US/i.test(v.lang)) || VOICES.find(v=>/^en/i.test(v.lang));
    if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function speakMany(list){
  if(!("speechSynthesis" in window)){ toast("이 브라우저는 발음을 지원하지 않아요"); return; }
  try{
    window.speechSynthesis.cancel();
    const v=VOICES.find(v=>/en[-_]US/i.test(v.lang)) || VOICES.find(v=>/^en/i.test(v.lang));
    list.filter(Boolean).forEach(t=>{
      const u=new SpeechSynthesisUtterance(t); u.lang="en-US"; u.rate=0.92; if(v) u.voice=v;
      window.speechSynthesis.speak(u);   // 여러 개 호출하면 순서대로 큐에 쌓여 차례로 읽음
    });
  }catch(e){}
}
const autoOn = ()=> !$("#autoSpeak") || $("#autoSpeak").checked;
function mountSpk(word, auto){
  const b=document.getElementById("spkBtn");
  if(b) b.onclick=(e)=>{ e.stopPropagation(); speak(word); };
  wireCopy(word);
  if(auto && autoOn()) setTimeout(()=>speak(word), 250);
}
function mountSpkMany(list, auto){
  const b=document.getElementById("spkBtn");
  if(b) b.onclick=(e)=>{ e.stopPropagation(); speakMany(list); };
  wireCopy(list[0]);
  if(auto && autoOn()) setTimeout(()=>speakMany(list), 200);
}
const SPKBTN = `<button class="spk" id="spkBtn" title="발음 듣기">🔊</button>`;

/* ---- 복사 ---- */
function fallbackCopy(text,done){
  try{ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); ta.remove(); done&&done(); }
  catch(e){ toast("복사 실패"); }
}
function copy(text){
  const done=()=>toast("복사됨: "+text);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else fallbackCopy(text,done);
}
function wireCopy(word){ const cb=document.getElementById("copyBtn"); if(cb) cb.onclick=(e)=>{ e.stopPropagation(); copy(word); }; }
const COPYBTN = `<button class="cpy" id="copyBtn" title="단어 복사">📋</button>`;

/* ---- 메모 굵게 (**텍스트** -> 볼드) ---- */
function mdBold(s){ return esc(s).replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>"); }
function boldWord(sentence, word){
  // bold the headword (and simple inflections) in example
  const base = word.split(" ")[0].replace(/[^a-zA-Z]/g,"");
  if(!base) return esc(sentence);
  const re = new RegExp("\\b("+base+"[a-z]*)\\b","gi");
  return esc(sentence).replace(re, "<b>$1</b>");
}

/* ---- elements ---- */
const $ = s => document.querySelector(s);
const sections = ["home","study","quiz","sheet","done"];
function show(sec){ sections.forEach(s=>$("#"+s).classList.toggle("hidden", s!==sec)); window.scrollTo(0,0); }
function toast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),1600); }
function esc(s){ return (s+"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---- home ---- */
function dueCount(){ return WORDS.filter(w=>isDue(w.id)).length; }
function learnedCount(){ return WORDS.filter(w=>isLearned(w.id)).length; }
function renderHome(){
  const cs = $("#catSel");
  cs.innerHTML = `<option value="__all">전체</option>` + DAYS.map(d=>`<option value="${d}">DAY ${d}</option>`).join("");
  const total = WORDS.length, learned = learnedCount(), due = dueCount();
  $("#homeBar").style.width = (total? (learned/total*100):0) + "%";
  $("#homeProg").textContent = `${learned} / ${total} 외움`;
  $("#homeDue").textContent = `오늘 복습 ${due}개`;
  $("#reviewBadge").textContent = `오늘 ${due}개`;
  $("#hstat").textContent = `${learned}/${total}`;
  $("#totalCount").textContent = total;
}

/* ---- session ---- */
function pool(){
  const day = $("#catSel").value;
  let arr = WORDS.filter(w=> day==="__all" || w.day===parseInt(day,10));
  if($("#ksOnly") && $("#ksOnly").checked) arr = arr.filter(w=>w.ks_has);
  return arr;
}
function ksHtml(w){
  if(!w.ks_has) return "";
  let html = `<div class="sec-title" style="margin-top:14px">📖 경선식 (안 외워질 때 펴보기)</div><div class="ks">`;
  if(w.ks_head && w.ks_head.length){
    html += `<div class="ks-head">표제어 ${esc(w.word)} · ${w.ks_head.map(p=>"p."+p).join(", ")}</div>`;
  }
  let ss = (w.ks_syn||[]).slice().sort((a,b)=>(b.k?1:0)-(a.k?1:0));
  if(ss.length){
    const shown = ss.slice(0,5).map(s=>`<span class="${s.k?'kk':''}">${esc(s.t)} ${s.p.map(p=>"p."+p).join("/")}</span>`).join(" · ");
    const more = ss.length>5 ? ` <span class="small">외 ${ss.length-5}개</span>` : "";
    html += `<div class="ks-syn">동의어 · ${shown}${more}</div>`;
  }
  html += `</div>`;
  return html;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildSession(mode){
  const count = parseInt($("#countSel").value,10);
  if(mode==="review"){
    let arr = WORDS.filter(w=>isDue(w.id));
    arr.sort((a,b)=>getP(a.id).due - getP(b.id).due);
    return arr;
  }
  let arr = pool();
  if($("#newFirst").checked){
    arr = shuffle(arr.filter(w=>!isLearned(w.id))).concat(shuffle(arr.filter(w=>isLearned(w.id))));
  } else arr = shuffle(arr);
  return arr.slice(0, count);
}

/* ================= STUDY / REVIEW / SYN ================= */
let S = null, timerId = null;
function clearTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }

function startStudy(mode){
  const list = buildSession(mode);
  if(!list.length){ toast(mode==="review"?"오늘 복습할 단어가 없어요 👍":"학습할 단어가 없어요"); return; }
  S = { mode, list, i:0, ok:0, no:0, revealed:false };
  $("#studyTitle").textContent = mode==="review"?"복습":mode==="syn"?"동의어":"외우기";
  show("study"); renderCard();
}

function renderCard(){
  clearTimer(); S.revealed=false;
  const w = S.list[S.i];
  $("#studyIdx").textContent = `${S.i+1} / ${S.list.length}`;
  const qcard = $("#qcard");
  $("#afterArea").innerHTML = "";
  const stars = "★".repeat(w.stars||0);
  if(S.mode==="syn"){
    qcard.innerHTML = `
      <div class="qcat">DAY ${w.day} · 동의어로 단어 맞히기</div>
      <div class="syns" style="justify-content:center;margin-top:14px">
        ${wSyns(w).slice(0,8).map(s=>synChip(w,s)).join("")||'<span class="small">동의어 없음</span>'}
      </div>
      <div class="qhint">탭하면 정답 공개</div>`;
  } else {
    qcard.innerHTML = `
      <div class="qcat">DAY ${w.day} <span class="stars">${stars}</span></div>
      <div class="qword">${esc(w.word)}</div>
      ${w.pron?`<div class="pron">[${esc(w.pron)}]</div>`:""}
      <div>${SPKBTN}${COPYBTN}</div>
      <div class="qhint">탭하면 뜻 공개</div>`;
    mountSpk(w.word, true);
  }
  const limit = parseInt($("#timeSel").value,10);
  const bar = $("#timerBar"), fill = $("#timerFill");
  bar.classList.remove("warn","danger");
  if(limit>0 && S.mode!=="review"){
    bar.style.visibility="visible"; let remain=limit*1000; const total=remain; fill.style.width="100%";
    timerId=setInterval(()=>{
      remain-=100; const pct=Math.max(0,remain/total*100); fill.style.width=pct+"%";
      bar.classList.toggle("warn",pct<50&&pct>=20); bar.classList.toggle("danger",pct<20);
      if(remain<=0){ clearTimer(); reveal(); }
    },100);
  } else bar.style.visibility="hidden";
}

function reveal(){
  if(S.revealed) return;
  S.revealed=true; clearTimer();
  const w = S.list[S.i];
  const stars = "★".repeat(w.stars||0);
  $("#qcard").innerHTML = `
    <div class="qcat">DAY ${w.day} <span class="stars">${stars}</span></div>
    <div class="qword">${esc(w.word)}</div>
    ${w.pron?`<div class="pron">[${esc(w.pron)}]</div>`:""}
    <div>${SPKBTN}${COPYBTN}</div>`;
  // 공개되면 표제어 + 동의어들을 순서대로 자동 발음
  mountSpkMany([w.word].concat(wSyns(w).slice(0,8)), true);

  const senses = w.senses.map(s=>`
    <div class="sense">
      <div>${s.pos?`<span class="pos">${esc(s.pos)}</span>`:""}<span class="mn">${esc(s.meaning)}</span></div>
      <div class="syns" style="margin-top:7px">${s.synonyms.map(x=>synChip(w,x)).join("")}</div>
      ${s.example?`<div class="example"><div class="en">${boldWord(s.example,w.word)}</div><div class="ko">${esc(s.example_ko||"")}</div></div>`:""}
    </div>`).join("");

  const legend = `<div class="legend"><b>파란 칩</b> = 핵심(시험 출제) 동의어</div>`;
  const nuance = w.nuance?`<div class="sec-title" style="margin-top:14px">어감 / 뉘앙스</div><div class="nuance">${esc(w.nuance)}</div>`:"";
  const deriv = (w.derivatives&&w.derivatives.length)?`<div class="deriv">파생어 ${w.derivatives.map(d=>`<span>${esc(d)}</span>`).join("")}</div>`:"";
  const tip = w.exam_tip?`<button class="tipbtn" id="tipBtn">💡 최신출제포인트 보기</button><div class="tipbox hidden" id="tipBox">${esc(w.exam_tip)}</div>`:"";

  $("#afterArea").innerHTML = `
    <div class="reveal">
      ${senses}
      ${legend}
      ${nuance}
      ${ksHtml(w)}
      ${deriv}
      ${tip}
      <div class="sec-title" style="margin-top:14px">📝 내 메모</div>
      <div id="mnemoView"></div>
      <div class="grid grade">
        <button class="gbtn no" id="bNo">✕ 몰랐음</button>
        <button class="gbtn ok" id="bOk">○ 알았음</button>
      </div>
    </div>`;
  if(w.exam_tip){ $("#tipBtn").onclick=()=>{ $("#tipBox").classList.toggle("hidden"); }; }
  renderMnemo(w);
  $("#bOk").onclick=()=>answer(true);
  $("#bNo").onclick=()=>answer(false);
}

function renderMnemo(w){
  const box=$("#mnemoView"); const m=mnemo[w.id]||"";
  box.innerHTML = m
    ? `<div class="mnemo" id="mClick">${mdBold(m)}</div>`
    : `<div class="mnemo empty" id="mClick">+ 메모 추가 (탭해서 입력 — **별표**로 굵게)</div>`;
  $("#mClick").onclick=()=>editMnemo(w);
}
function editMnemo(w){
  $("#mnemoView").innerHTML = `
    <textarea id="mEdit" placeholder="메모 입력... (별표로 감싸면 **굵게**)">${esc(mnemo[w.id]||"")}</textarea>
    <div class="row" style="margin-top:8px">
      <button class="ghost" id="mSave" style="background:var(--green);color:#fff">저장</button>
      <button class="ghost" id="mCancel">취소</button>
    </div>`;
  const ta=$("#mEdit"); ta.focus();
  $("#mSave").onclick=()=>{ const v=ta.value.trim(); if(v) mnemo[w.id]=v; else delete mnemo[w.id]; save(LS_MNEMO,mnemo); renderMnemo(w); toast("메모 저장됨"); };
  $("#mCancel").onclick=()=>renderMnemo(w);
}

function answer(correct){ const w=S.list[S.i]; grade(w.id,correct); if(correct)S.ok++; else S.no++; next(); }
function next(){ S.i++; if(S.i>=S.list.length){ finish(); return; } renderCard(); }

/* ================= QUIZ ================= */
let Q=null;
function startQuiz(){
  if($("#sheetMode") && $("#sheetMode").checked){ startSheet(); return; }
  const list=buildSession("study");
  if(list.length<4){ toast("퀴즈는 최소 4단어 필요"); return; }
  Q={list,i:0,score:0,type:($("#quizType")?$("#quizType").value:"syn")}; show("quiz"); renderQuiz();
}

/* ===== 한 문제 생성 (시험지/단문제 공용) ===== */
function makeQ(w, baseMode){
  let mode = baseMode==="mix" ? (Math.random()<0.5?"syn":"mean") : baseMode;
  if(mode==="syn" && wSyns(w).length===0) mode="mean";
  let answer, options, sub="";
  if(mode==="syn"){
    const keyList=wSyns(w).filter(x=>isKey(w,x));
    answer=(keyList.length?keyList:wSyns(w))[0];
    const used=new Set(wSyns(w).map(norm)); const ds=[];
    for(const o of shuffle(WORDS)){ if(ds.length>=3)break; if(o.id===w.id)continue; const s=pickSyn(o); if(s&&!used.has(norm(s))){ds.push(s);used.add(norm(s));} }
    options=shuffle([answer,...ds]); sub=wMeaning(w);
  } else {
    answer=wMeaning(w);
    const used=new Set([norm(answer)]); const ds=[];
    for(const o of shuffle(WORDS)){ if(ds.length>=3)break; if(o.id===w.id)continue; const m=wMeaning(o); if(!used.has(norm(m))){ds.push(m);used.add(norm(m));} }
    options=shuffle([answer,...ds]);
  }
  return {w, mode, answer, options, sub};
}

/* ===== 시험지 모드 ===== */
let SH=null;
const CIRC="ⓐⓑⓒⓓ";
function startSheet(){
  const list=buildSession("study");
  if(list.length<4){ toast("시험지는 최소 4단어 필요"); return; }
  const type=$("#quizType")?$("#quizType").value:"syn";
  SH={ qs:list.map(w=>makeQ(w,type)), graded:false };
  $("#sheetInfo").textContent = type==="mean" ? "단어의 우리말 뜻을 고르세요" : "왼쪽 단어의 동의어를 고르세요";
  renderSheet(); show("sheet");
}
function renderSheet(){
  const body=$("#sheetBody");
  body.innerHTML = SH.qs.map((q,qi)=>`
    <div class="sq" id="sq${qi}">
      <div class="sqw">${qi+1}. ${esc(q.w.word)} <button class="spk mini" data-w="${esc(q.w.word)}">🔊</button><button class="cpy mini" data-w="${esc(q.w.word)}">📋</button></div>
      ${q.sub?`<div class="sqsub">${esc(q.sub)}</div>`:""}
      <div class="sqopts">
        ${q.options.map((o,oi)=>`<button class="sopt" data-q="${qi}" data-correct="${o===q.answer?1:0}">${CIRC[oi]||"·"} ${esc(o)}</button>`).join("")}
      </div>
    </div>`).join("") + `<button class="fullbtn" id="gradeBtn">채점하기</button>`;

  body.querySelectorAll(".sopt").forEach(b=>{
    b.onclick=()=>{
      if(SH.graded) return;
      const qi=b.dataset.q;
      body.querySelectorAll(`.sopt[data-q="${qi}"]`).forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel");
    };
  });
  body.querySelectorAll(".spk.mini").forEach(b=>{ b.onclick=(e)=>{ e.stopPropagation(); speak(b.dataset.w); }; });
  body.querySelectorAll(".cpy.mini").forEach(b=>{ b.onclick=(e)=>{ e.stopPropagation(); copy(b.dataset.w); }; });
  $("#gradeBtn").onclick=gradeSheet;
}
function gradeSheet(){
  if(SH.graded) return; SH.graded=true;
  let score=0;
  SH.qs.forEach((q,qi)=>{
    const wrap=document.getElementById("sq"+qi);
    const sel=wrap.querySelector(".sopt.sel");
    const correctBtn=wrap.querySelector('.sopt[data-correct="1"]');
    if(correctBtn) correctBtn.classList.add("correct");
    let right=false;
    if(sel){ if(sel===correctBtn) right=true; else sel.classList.add("wrong"); }
    if(right) score++;
    grade(q.w.id, right);
    wrap.querySelectorAll(".sopt").forEach(b=>b.disabled=true);
  });
  const gb=$("#gradeBtn");
  gb.outerHTML = `<div class="sheet-score">${score} / ${SH.qs.length} 정답</div>
    <button class="fullbtn" id="sheetAgain">다시 풀기</button>
    <button class="fullbtn" id="sheetHome" style="background:var(--card2)">홈으로</button>`;
  $("#sheetAgain").onclick=startSheet;
  $("#sheetHome").onclick=()=>{ show("home"); renderHome(); };
  renderHome();
  window.scrollTo(0,0);
}
function renderQuiz(){
  const w=Q.list[Q.i];
  $("#quizIdx").textContent=`${Q.i+1} / ${Q.list.length}`;
  $("#quizScore").textContent=`${Q.score}점`;
  let mode=Q.type==="mix" ? (Math.random()<0.5?"syn":"mean") : Q.type;
  if(mode==="syn" && wSyns(w).length===0) mode="mean";   // fallback
  const box=$("#quizOpts"); box.innerHTML="";
  let answerText, options;

  if(mode==="syn"){
    const keyList=wSyns(w).filter(x=>isKey(w,x));
    answerText=(keyList.length?keyList:wSyns(w))[0];
    const used=new Set(wSyns(w).map(norm));   // exclude this word's own synonyms from distractors
    const ds=[];
    for(const o of shuffle(WORDS)){
      if(ds.length>=3) break;
      if(o.id===w.id) continue;
      const s=pickSyn(o);
      if(s && !used.has(norm(s))){ ds.push(s); used.add(norm(s)); }
    }
    options=shuffle([answerText,...ds]);
    $("#quizQ").innerHTML=`<div class="qcat">동의어 고르기</div><div class="qword" style="font-size:30px">${esc(w.word)}</div><div class="pron" style="margin-top:6px">${esc(wMeaning(w))}</div><div>${SPKBTN}${COPYBTN}</div>`;
  } else {
    answerText=wMeaning(w);
    const used=new Set([norm(answerText)]); const ds=[];
    for(const o of shuffle(WORDS)){
      if(ds.length>=3) break;
      if(o.id===w.id) continue;
      const m=wMeaning(o);
      if(!used.has(norm(m))){ ds.push(m); used.add(norm(m)); }
    }
    options=shuffle([answerText,...ds]);
    $("#quizQ").innerHTML=`<div class="qcat">우리말 뜻 맞추기</div><div class="qword" style="font-size:30px">${esc(w.word)}</div><div>${SPKBTN}${COPYBTN}</div>`;
  }
  mountSpk(w.word, true);

  options.forEach(opt=>{
    const b=document.createElement("button"); b.className="opt"; b.textContent=opt;
    b.onclick=()=>{
      const right = opt===answerText;
      [...box.children].forEach(c=>c.disabled=true);
      b.classList.add(right?"correct":"wrong");
      if(!right){ [...box.children].forEach(c=>{ if(c.textContent===answerText) c.classList.add("correct"); }); }
      grade(w.id,right); if(right)Q.score++;
      setTimeout(()=>{ Q.i++; if(Q.i>=Q.list.length) finishQuiz(); else renderQuiz(); }, right?500:1100);
    };
    box.appendChild(b);
  });
}
function finishQuiz(){
  clearTimer();
  $("#doneEmoji").textContent=Q.score===Q.list.length?"🏆":Q.score>=Q.list.length*0.7?"🎉":"💪";
  $("#doneTitle").textContent=`${Q.score} / ${Q.list.length} 정답`;
  $("#doneSub").textContent="퀴즈 완료";
  $("#dOk").textContent=Q.score; $("#dNo").textContent=Q.list.length-Q.score; $("#dDue").textContent=dueCount();
  $("#againBtn").onclick=()=>startQuiz();
  show("done"); renderHome();
}

/* ================= finish (study) ================= */
function finish(){
  clearTimer();
  $("#doneEmoji").textContent=S.no===0?"🏆":"🎉";
  $("#doneTitle").textContent="완료!";
  $("#doneSub").textContent=S.mode==="review"?"복습 끝":"세션 끝";
  $("#dOk").textContent=S.ok; $("#dNo").textContent=S.no; $("#dDue").textContent=dueCount();
  $("#againBtn").onclick=()=>startStudy(S.mode);
  show("done"); renderHome();
}

/* ================= events ================= */
document.querySelectorAll(".mode-btn").forEach(b=>{
  b.onclick=()=>{ const m=b.dataset.mode; if(m==="quiz") startQuiz(); else startStudy(m); };
});
$("#qcard").addEventListener("click", ()=>{ if(S && !S.revealed) reveal(); });
$("#quitStudy").onclick=()=>{ clearTimer(); show("home"); renderHome(); };
$("#quitQuiz").onclick=()=>{ show("home"); renderHome(); };
$("#quitSheet").onclick=()=>{ show("home"); renderHome(); };
$("#homeBtn").onclick=()=>{ show("home"); renderHome(); };

/* ---- backup / restore ---- */
$("#exportBtn").onclick=()=>{
  const data={progress:prog,mnemo:mnemo,exported:todayStr(),v:2};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`hackers-voca-backup-${todayStr()}.json`; a.click();
  toast("백업 파일 저장됨");
};
$("#importBtn").onclick=()=>$("#importFile").click();
$("#importFile").onchange=(e)=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
    if(d.progress){ prog=d.progress; save(LS_PROG,prog); }
    if(d.mnemo){ mnemo=d.mnemo; save(LS_MNEMO,mnemo); }
    renderHome(); toast("가져오기 완료 ✅");
  }catch{ toast("파일을 읽을 수 없어요"); } };
  r.readAsText(f); e.target.value="";
};
$("#resetBtn").onclick=()=>{
  if(confirm("진도(외운 단어/복습 일정)를 모두 초기화할까요?\n내 메모는 유지됩니다.")){
    prog={}; save(LS_PROG,prog); renderHome(); toast("초기화 완료");
  }
};

renderHome();

</script>
</body>
</html>
